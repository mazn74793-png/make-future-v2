<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center — الدفع</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap');
:root {
  --primary:#7c3aed;--primary-light:#9d5ff5;--primary-dark:#5b21b6;
  --secondary:#06b6d4;--accent:#f59e0b;--danger:#ef4444;--success:#10b981;--warn:#f59e0b;
  --grad:linear-gradient(135deg,#7c3aed 0%,#06b6d4 100%);
  --grad-soft:linear-gradient(135deg,rgba(124,58,237,0.15) 0%,rgba(6,182,212,0.15) 100%);
  --bg:#0a0f1e;--bg2:#0f172a;--bg3:#1e293b;--bg4:#263147;
  --surface:rgba(30,41,59,0.8);--surface2:rgba(38,49,71,0.9);
  --border:rgba(124,58,237,0.2);--border2:rgba(255,255,255,0.06);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --shadow:0 8px 32px rgba(0,0,0,0.4);--shadow-lg:0 20px 60px rgba(0,0,0,0.5);
  --glow:0 0 40px rgba(124,58,237,0.3);
}
[data-theme="light"] {
  --bg:#f8fafc;--bg2:#f1f5f9;--bg3:#e2e8f0;--bg4:#cbd5e1;
  --surface:rgba(255,255,255,0.9);--surface2:rgba(248,250,252,0.95);
  --border:rgba(124,58,237,0.2);--border2:rgba(0,0,0,0.06);
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-lg:0 20px 60px rgba(0,0,0,0.12);
  --glow:0 0 40px rgba(124,58,237,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
h1,h2,h3,h4,h5,h6{font-weight:700;line-height:1.3}a{color:inherit;text-decoration:none}img{max-width:100%}
.bg-mesh{position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(124,58,237,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,.08) 0%,transparent 60%),var(--bg)}
.glass{background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}
.glass-sm{background:var(--surface2);backdrop-filter:blur(12px);border:1px solid var(--border2);border-radius:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;user-select:none;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s}
.btn:hover::after{background:rgba(255,255,255,.08)}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.4)}.btn-primary:hover{box-shadow:0 8px 30px rgba(124,58,237,.5);transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}.btn-lg{padding:14px 32px;font-size:16px;border-radius:14px}.btn-block{width:100%}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.form-input,.form-select,.form-textarea{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;transition:all .2s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,.15);background:var(--bg2)}
.form-input::placeholder{color:var(--text3)}.form-textarea{resize:vertical;min-height:80px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-success{background:rgba(16,185,129,.15);color:#10b981}.badge-warn{background:rgba(245,158,11,.15);color:#f59e0b}
.navbar{position:sticky;top:0;z-index:100;background:rgba(10,15,30,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;transition:background .3s}
[data-theme="light"] .navbar{background:rgba(248,250,252,.9)}
.nav-logo{font-size:18px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.theme-toggle{width:40px;height:40px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.theme-toggle:hover{background:var(--bg4);transform:scale(1.05)}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{to{background-position:200% center}}
.fade-up{animation:fadeUp .5s ease both}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:480px){.grid-2{grid-template-columns:1fr}}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.text-center{text-align:center}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--text2)}.font-bold{font-weight:700}.font-black{font-weight:900}.hidden{display:none!important}

/* page specific */
.payment-wrap{min-height:100vh;padding:80px 16px 40px;display:flex;align-items:flex-start;justify-content:center}
.payment-card{width:100%;max-width:500px}
.course-summary{padding:20px;border-radius:16px;background:var(--grad-soft);border:1px solid var(--border);margin-bottom:24px}
.price-display{font-size:36px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.method-card{padding:16px;border-radius:14px;border:2px solid var(--border2);background:var(--bg3);cursor:pointer;transition:all .2s}
.method-card:hover{border-color:var(--primary);background:rgba(124,58,237,.08)}
.method-card.selected{border-color:var(--primary);background:rgba(124,58,237,.12)}
.method-card .method-icon{font-size:28px;margin-bottom:8px}
.method-card .method-name{font-size:14px;font-weight:700}
.method-card .method-num{font-size:18px;font-weight:900;color:var(--primary-light);direction:ltr;margin-top:4px}
.coupon-row{display:flex;gap:8px}.coupon-row .form-input{flex:1}
.coupon-result{padding:10px 14px;border-radius:10px;font-size:13px;margin-top:8px}
.coupon-ok{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.coupon-err{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.total-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border2)}

/* receipt upload */
.receipt-drop{border:2px dashed var(--border2);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.receipt-drop:hover,.receipt-drop.drag-over{border-color:var(--primary);background:rgba(124,58,237,.06)}
.receipt-drop.has-file{border-color:var(--success);background:rgba(16,185,129,.06)}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<nav class="navbar">
  <button class="btn btn-sm btn-secondary" onclick="history.back()">← رجوع</button>
  <span class="nav-logo">💳 الدفع</span>
  <button class="theme-toggle" onclick="onToggleTheme()" id="themeBtn">🌙</button>
</nav>

<div class="payment-wrap">
  <div class="payment-card fade-up">

    <!-- Course Summary -->
    <div class="course-summary">
      <div class="text-sm text-muted mb-1">الكورس المختار</div>
      <div class="font-bold" style="font-size:18px" id="courseTitle">—</div>
      <div class="text-sm text-muted mt-1" id="courseInfo">—</div>
      <div class="mt-3 flex items-center justify-between">
        <span class="text-sm text-muted">السعر الأصلي</span>
        <span class="price-display" id="coursePriceDisplay">0</span>
      </div>
    </div>

    <div class="glass p-6">

      <!-- Coupon -->
      <div class="form-group">
        <label class="form-label">🎫 كوبون الخصم (اختياري)</label>
        <div class="coupon-row">
          <input type="text" class="form-input" id="couponInput" placeholder="أدخل الكود" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
          <button class="btn btn-secondary" onclick="validateCoupon()" id="couponBtn">تحقق</button>
        </div>
        <div id="couponResult" class="hidden"></div>
      </div>

      <!-- Final Price -->
      <div id="finalPriceRow" class="total-row hidden">
        <span class="text-sm font-bold">السعر بعد الخصم</span>
        <span class="font-black" style="font-size:24px;color:var(--success)" id="finalPriceDisplay">0</span>
      </div>

      <!-- Payment Method -->
      <div class="form-group">
        <label class="form-label">طريقة الدفع</label>
        <div class="grid-2 gap-3">
          <div class="method-card" id="methodVF" onclick="selectMethod('Vodafone Cash','methodVF')">
            <div class="method-icon">📱</div>
            <div class="method-name">Vodafone Cash</div>
            <div class="method-num">01210575530</div>
          </div>
          <div class="method-card" id="methodIP" onclick="selectMethod('InstaPay','methodIP')">
            <div class="method-icon">💸</div>
            <div class="method-name">InstaPay</div>
            <div class="method-num">01210575530</div>
          </div>
        </div>
      </div>

      <!-- Transaction ID -->
      <div class="form-group">
        <label class="form-label">رقم العملية / كود التحويل <span style="color:var(--danger)">*</span></label>
        <input type="text" class="form-input" id="txnId" placeholder="مثال: 1234567890" inputmode="numeric">
      </div>

      <!-- Receipt Upload — ✅ FIXED -->
      <div class="form-group">
        <label class="form-label">📸 صورة الإيصال <span style="color:var(--danger)">*</span></label>
        <div class="receipt-drop" id="receiptDropArea"
          onclick="document.getElementById('receiptFile').click()"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handleReceiptDrop(event)">
          <div id="receiptPlaceholder">
            <div style="font-size:32px;margin-bottom:8px">📷</div>
            <div style="font-size:13px;font-weight:700">اضغط أو اسحب صورة الإيصال هنا</div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">JPG / PNG / WEBP — حتى 5 ميجا</div>
          </div>
          <img id="receiptPreview" src="" style="max-width:100%;max-height:200px;border-radius:10px;display:none;object-fit:contain">
        </div>
        <input type="file" id="receiptFile" accept="image/*" style="display:none" onchange="previewReceipt(this)">
        <div id="receiptStatus" style="font-size:12px;margin-top:6px;color:var(--text2)"></div>
      </div>

      <!-- Note -->
      <div class="form-group">
        <label class="form-label">ملاحظة (اختياري)</label>
        <textarea class="form-textarea" id="txnNote" placeholder="أي ملاحظة إضافية..."></textarea>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-block btn-lg" id="btnPay" onclick="doPayment()">
        📤 إرسال طلب الاشتراك
      </button>
      <p class="text-center text-xs text-muted mt-3">سيتم مراجعة طلبك خلال 24 ساعة وإرسال إشعار عند القبول</p>
    </div>
  </div>
</div>

<script>
const MF_CONFIG = {
  SUPABASE_URL: 'https://pjskzfyjzvibqglhdykc.supabase.co',
  ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqc2t6ZnlqenZpYnFnbGhkeWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjU4NTcsImV4cCI6MjA4ODY0MTg1N30.AqdIBX-6tP9nMRVao4X7A1aV5L4J7mTiNC1RWeWf7LI',
  FN: 'https://pjskzfyjzvibqglhdykc.supabase.co/functions/v1',
  WA_ADMIN: '201210575530',
  PAYMENT_PHONE: '01210575530'
};

async function refreshToken(){
  const refresh=localStorage.getItem('mf_refresh_token');
  if(!refresh||refresh==='null')return false;
  try{
    const res=await fetch('https://pjskzfyjzvibqglhdykc.supabase.co/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'Content-Type':'application/json','apikey':MF_CONFIG.ANON_KEY},body:JSON.stringify({refresh_token:refresh})});
    const data=await res.json();
    if(data.access_token){localStorage.setItem('mf_access_token',data.access_token);localStorage.setItem('mf_refresh_token',data.refresh_token);return true;}
  }catch(e){}
  return false;
}
async function mfFetch(endpoint,options={},_retry=false){
  const token=localStorage.getItem('mf_access_token');
  const validToken=token&&token!=='null'&&token!=='undefined'&&token.length>20;
  const headers={'Content-Type':'application/json','apikey':MF_CONFIG.ANON_KEY,'Authorization':`Bearer ${validToken?token:MF_CONFIG.ANON_KEY}`,...(options.headers||{})};
  try{
    const res=await fetch(`${MF_CONFIG.FN}/${endpoint}`,{...options,headers});
    if(res.status===401&&!_retry){const refreshed=await refreshToken();if(refreshed)return mfFetch(endpoint,options,true);['mf_access_token','mf_refresh_token','mf_user'].forEach(k=>localStorage.removeItem(k));window.location.href='login.html';return{ok:false,error:'انتهت الجلسة'};}
    return await res.json();
  }catch(e){return{ok:false,error:e.message};}
}
function getUser(){try{return JSON.parse(localStorage.getItem('mf_user')||'null');}catch{return null;}}
function requireAuth(roles=[]){const u=getUser();if(!u){window.location.href='login.html';return null;}if(roles.length&&!roles.includes(u.role)){window.location.href=u.role==='student'?'student.html':'admin.html';return null;}return u;}
function toast(msg,type='info',duration=3500){
  const colors={success:'#10b981',error:'#ef4444',info:'#7c3aed',warn:'#f59e0b'};
  const icons={success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:${colors[type]};color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-family:Cairo,sans-serif;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center;direction:rtl`;
  el.textContent=icons[type]+' '+msg;document.body.appendChild(el);
  requestAnimationFrame(()=>{el.style.transform='translateX(-50%) translateY(0)';});
  setTimeout(()=>{el.style.transform='translateX(-50%) translateY(100px)';setTimeout(()=>el.remove(),300);},duration);
}
function initTheme(){const s=localStorage.getItem('mf_theme')||'dark';document.documentElement.setAttribute('data-theme',s);}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);}
function fmtNum(n){return Number(n||0).toLocaleString('ar-EG');}
</script>
<script>
initTheme();
function updateThemeBtn(){document.getElementById('themeBtn').textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';}
function onToggleTheme(){toggleTheme();updateThemeBtn();}
updateThemeBtn();

const user=requireAuth(['student']);
if(!user)throw new Error('no user');

const course=JSON.parse(localStorage.getItem('mf_selected_course')||'null');
if(!course){toast('لم يتم اختيار كورس','error');setTimeout(()=>history.back(),1500);}
else{
  document.getElementById('courseTitle').textContent=course.title;
  document.getElementById('courseInfo').textContent=(course.subject||'')+' — '+(course.teacher_name||'');
  document.getElementById('coursePriceDisplay').textContent=fmtNum(course.price)+' جنيه';
}

let selectedMethod='';
let appliedCoupon=null;
let originalPrice=course?.price||0;
let finalPrice=originalPrice;

function selectMethod(name,id){
  document.querySelectorAll('.method-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById(id).classList.add('selected');
  selectedMethod=name;
}
selectMethod('Vodafone Cash','methodVF');

async function validateCoupon(){
  const code=document.getElementById('couponInput').value.trim();
  if(!code){toast('أدخل كود الكوبون','warn');return;}
  const btn=document.getElementById('couponBtn');btn.disabled=true;btn.textContent='⏳';
  const res=await mfFetch('coupons',{method:'POST',body:JSON.stringify({action:'validate',code,user_id:user.id})});
  btn.disabled=false;btn.textContent='تحقق';
  const el=document.getElementById('couponResult');el.classList.remove('hidden','coupon-ok','coupon-err');
  if(!res.ok){
    el.className='coupon-result coupon-err';el.textContent='❌ '+res.error;
    appliedCoupon=null;finalPrice=originalPrice;updateFinalPrice();
  }else{
    appliedCoupon=res.coupon;
    finalPrice=appliedCoupon.discount_type==='percent'?Math.round(originalPrice*(1-appliedCoupon.discount_value/100)):Math.max(0,originalPrice-appliedCoupon.discount_value);
    el.className='coupon-result coupon-ok';
    el.textContent=`✅ خصم ${appliedCoupon.discount_value}${appliedCoupon.discount_type==='percent'?'%':' جنيه'} — وفرت ${fmtNum(originalPrice-finalPrice)} جنيه`;
    updateFinalPrice();
  }
}
function updateFinalPrice(){
  const row=document.getElementById('finalPriceRow');
  if(appliedCoupon){row.classList.remove('hidden');document.getElementById('finalPriceDisplay').textContent=fmtNum(finalPrice)+' جنيه';}
  else{row.classList.add('hidden');}
}

// ─── Receipt Preview ──────────────────
function previewReceipt(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('الصورة أكبر من 5 ميجا','error');input.value='';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById('receiptPreview');
    prev.src=e.target.result;prev.style.display='';
    document.getElementById('receiptPlaceholder').style.display='none';
    document.getElementById('receiptStatus').textContent='✅ '+file.name;
    document.getElementById('receiptDropArea').classList.add('has-file');
    document.getElementById('receiptDropArea').classList.remove('drag-over');
  };
  reader.readAsDataURL(file);
}

function handleReceiptDrop(e){
  e.preventDefault();
  document.getElementById('receiptDropArea').classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(file){
    // Inject into input
    const dt=new DataTransfer();dt.items.add(file);
    document.getElementById('receiptFile').files=dt.files;
    previewReceipt(document.getElementById('receiptFile'));
  }
}

// ─── ✅ FIXED: uploadReceipt — base64 JSON بدل raw binary ─────────
async function uploadReceipt(){
  const file=document.getElementById('receiptFile').files[0];
  if(!file)return null;

  const statusEl=document.getElementById('receiptStatus');
  statusEl.textContent='⏳ جاري تحضير الصورة...';

  // خطوة 1: اقرأ الصورة كـ base64 data URI
  const base64=await new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);   // "data:image/jpeg;base64,/9j/..."
    reader.onerror=()=>reject(new Error('فشل قراءة الملف'));
    reader.readAsDataURL(file);
  });

  statusEl.textContent='⏳ جاري رفع الصورة...';

  const token=localStorage.getItem('mf_access_token');
  const validToken=token&&token!=='null'&&token.length>20;

  try{
    // خطوة 2: ابعت JSON مع الـ base64 — مش raw binary
    const res=await fetch(`${MF_CONFIG.FN}/upload-image`,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',          // ✅ JSON مش file.type
        'apikey':MF_CONFIG.ANON_KEY,
        'Authorization':`Bearer ${validToken?token:MF_CONFIG.ANON_KEY}`,
      },
      body:JSON.stringify({
        file: base64,                               // ✅ base64 data URI كامل
        filename: file.name,
        content_type: file.type,
        image_type: 'receipt'
      })
    });

    const data=await res.json();
    if(data.ok&&data.url){
      statusEl.textContent='✅ تم رفع الإيصال بنجاح';
      return data.url;
    }else{
      statusEl.textContent='❌ '+(data.error||'فشل الرفع');
      toast(data.error||'فشل رفع الإيصال','error');
      return null;
    }
  }catch(e){
    statusEl.textContent='❌ خطأ: '+e.message;
    toast('فشل رفع الإيصال: '+e.message,'error');
    return null;
  }
}

// ─── Submit Payment ───────────────────
async function doPayment(){
  if(!selectedMethod){toast('اختر طريقة الدفع','warn');return;}
  const txnId=document.getElementById('txnId').value.trim();
  if(!txnId){toast('أدخل رقم العملية','warn');return;}
  const receiptFile=document.getElementById('receiptFile').files[0];
  if(!receiptFile){toast('ارفع صورة الإيصال أولاً 📸','warn');return;}
  const note=document.getElementById('txnNote').value.trim();

  const btn=document.getElementById('btnPay');
  btn.disabled=true;btn.textContent='⏳ جاري رفع الصورة...';

  const receiptUrl=await uploadReceipt();
  if(!receiptUrl){btn.disabled=false;btn.textContent='📤 إرسال طلب الاشتراك';return;}

  btn.textContent='⏳ جاري الإرسال...';

  const body={
    user_id:user.id,course_id:course.id,
    method:selectedMethod,
    amount:originalPrice,final_amount:finalPrice,
    transaction_id:txnId,
    receipt_note:note||null,
    receipt_image_url:receiptUrl
  };
  if(appliedCoupon)body.coupon_id=appliedCoupon.id;

  const res=await mfFetch('create-payment',{method:'POST',body:JSON.stringify(body)});
  btn.disabled=false;btn.textContent='📤 إرسال طلب الاشتراك';

  if(!res.ok){toast(res.error||'فشل الإرسال','error');return;}

  // إشعار الأدمن على واتساب
  const waMsg=`🎓 طلب اشتراك جديد!\n👤 ${user.full_name||''}\n📚 ${course.title}\n💰 ${fmtNum(finalPrice)} جنيه\n📱 ${selectedMethod}\n🔢 ${txnId}`;
  const waUrl=`https://wa.me/${MF_CONFIG.WA_ADMIN}?text=${encodeURIComponent(waMsg)}`;

  toast('تم إرسال طلبك بنجاح! ✅','success',5000);
  setTimeout(()=>window.open(waUrl,'_blank'),800);
  setTimeout(()=>window.location.href='student.html',3500);
}
</script>
</body>
</html>
