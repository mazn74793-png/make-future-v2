<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center — تسجيل الدخول</title>
<link rel="manifest" href="manifest.json">
<style>
/* ═══════════════════════════════════════
   Make Future Center V2 — Global Styles
   ═══════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap');

/* ─── CSS Variables ─────────────────── */
:root {
  --primary: #7c3aed;
  --primary-light: #9d5ff5;
  --primary-dark: #5b21b6;
  --secondary: #06b6d4;
  --secondary-light: #22d3ee;
  --accent: #f59e0b;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;

  --grad: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
  --grad-soft: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(6,182,212,0.15) 100%);

  /* Dark Theme (default) */
  --bg: #0a0f1e;
  --bg2: #0f172a;
  --bg3: #1e293b;
  --bg4: #263147;
  --surface: rgba(30,41,59,0.8);
  --surface2: rgba(38,49,71,0.9);
  --border: rgba(124,58,237,0.2);
  --border2: rgba(255,255,255,0.06);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --glow: 0 0 40px rgba(124,58,237,0.3);
}

[data-theme="light"] {
  --bg: #f8fafc;
  --bg2: #f1f5f9;
  --bg3: #e2e8f0;
  --bg4: #cbd5e1;
  --surface: rgba(255,255,255,0.9);
  --surface2: rgba(248,250,252,0.95);
  --border: rgba(124,58,237,0.2);
  --border2: rgba(0,0,0,0.06);
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
  --glow: 0 0 40px rgba(124,58,237,0.15);
}

/* ─── Reset & Base ──────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ─── Scrollbar ─────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* ─── Typography ────────────────────── */
h1,h2,h3,h4,h5,h6 { font-weight: 700; line-height: 1.3; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; }

/* ─── Background Mesh ───────────────── */
.bg-mesh {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%),
    var(--bg);
}

/* ─── Glass Card ────────────────────── */
.glass {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
}
.glass-sm {
  background: var(--surface2);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border2);
  border-radius: 12px;
}

/* ─── Buttons ───────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 24px; border-radius: 12px; font-family: 'Cairo', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
  user-select: none; position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.btn:hover::after { background: rgba(255,255,255,0.08); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

.btn-primary { background: var(--grad); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.btn-primary:hover { box-shadow: 0 8px 30px rgba(124,58,237,0.5); transform: translateY(-1px); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--bg4); }
.btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.btn-success:hover { background: rgba(16,185,129,0.25); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.btn-lg { padding: 14px 32px; font-size: 16px; border-radius: 14px; }
.btn-block { width: 100%; }
.btn-icon { padding: 8px; border-radius: 8px; aspect-ratio: 1; }

/* ─── Form Inputs ───────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 16px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 12px;
  color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px;
  transition: all 0.2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  background: var(--bg2);
}
.form-input::placeholder { color: var(--text3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }

/* ─── Badges ────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-primary { background: rgba(124,58,237,0.2); color: var(--primary-light); }
.badge-success { background: rgba(16,185,129,0.15); color: #10b981; }
.badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-info { background: rgba(6,182,212,0.15); color: #06b6d4; }

/* ─── Stat Cards ────────────────────── */
.stat-card {
  padding: 24px; border-radius: 20px; position: relative; overflow: hidden;
  background: var(--surface); border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s;
}
.stat-card:hover { transform: translateY(-4px); box-shadow: var(--glow); }
.stat-card .stat-icon { font-size: 32px; margin-bottom: 12px; }
.stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-card .stat-label { font-size: 13px; color: var(--text2); margin-top: 6px; }
.stat-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--grad-soft); opacity: 0.5; z-index: 0;
}
.stat-card > * { position: relative; z-index: 1; }

/* ─── Progress Bar ──────────────────── */
.progress-wrap { background: var(--bg3); border-radius: 999px; overflow: hidden; height: 6px; }
.progress-bar { height: 100%; background: var(--grad); border-radius: 999px; transition: width 0.6s ease; }

/* ─── Progress Ring ─────────────────── */
.progress-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring .ring-text { position: absolute; font-size: 13px; font-weight: 800; color: var(--text); }

/* ─── Tabs ──────────────────────────── */
.tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: 14px; padding: 4px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 16px; border-radius: 10px; font-family: 'Cairo', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; border: none;
  background: transparent; color: var(--text2); transition: all 0.2s; white-space: nowrap;
}
.tab-btn.active { background: var(--grad); color: #fff; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
.tab-pane { display: none; }
.tab-pane.active { display: block; animation: fadeIn 0.3s ease; }

/* ─── Table ─────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border2); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 14px 16px; background: var(--bg3); color: var(--text2); font-weight: 600; text-align: right; white-space: nowrap; }
td { padding: 12px 16px; border-top: 1px solid var(--border2); color: var(--text); }
tr:hover td { background: rgba(124,58,237,0.04); }

/* ─── Modal ─────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 24px;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  transform: scale(0.9) translateY(20px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal-box { transform: scale(1) translateY(0); }
.modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 20px 24px 24px; }
.modal-title { font-size: 18px; font-weight: 700; }

/* ─── Navbar ────────────────────────── */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,15,30,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; height: 64px;
  transition: background 0.3s;
}
[data-theme="light"] .navbar { background: rgba(248,250,252,0.9); }
.nav-logo { font-size: 18px; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-actions { display: flex; align-items: center; gap: 8px; }

/* ─── Notification Badge ────────────── */
.notif-dot {
  position: absolute; top: -2px; right: -2px; width: 8px; height: 8px;
  background: var(--danger); border-radius: 50%; border: 2px solid var(--bg);
  animation: pulse 2s infinite;
}

/* ─── Animations ────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } }
@keyframes shimmer { to { background-position: 200% center; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.fade-up { animation: fadeUp 0.5s ease both; }
.fade-up-1 { animation-delay: 0.1s; }
.fade-up-2 { animation-delay: 0.2s; }
.fade-up-3 { animation-delay: 0.3s; }
.fade-up-4 { animation-delay: 0.4s; }

/* ─── Skeleton Loading ──────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% auto;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

/* ─── Grid ──────────────────────────── */
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
@media (max-width: 900px) { .grid-4,.grid-3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px) { .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr; } }

/* ─── Utility ───────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.w-full { width: 100%; }
.text-center { text-align: center; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--text2); }
.text-primary { color: var(--primary-light); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warn { color: var(--warn); }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.p-3 { padding: 12px; } .p-4 { padding: 16px; } .p-5 { padding: 20px; } .p-6 { padding: 24px; }
.rounded { border-radius: 8px; } .rounded-lg { border-radius: 14px; } .rounded-xl { border-radius: 20px; }
.hidden { display: none !important; }
.pointer { cursor: pointer; }

/* ─── Theme Toggle ──────────────────── */
.theme-toggle {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border2);
  background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.2s;
}
.theme-toggle:hover { background: var(--bg4); transform: scale(1.05); }

/* ─── Empty State ───────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ─── Container ─────────────────────── */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.page-content { padding: 24px 0; }

/* ─── Section Header ────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 18px; font-weight: 700; }

/* ─── Divider ───────────────────────── */
.divider { height: 1px; background: var(--border2); margin: 16px 0; }

/* ─── Scrollable List ───────────────── */
.scroll-list { max-height: 400px; overflow-y: auto; }

/* ─── PWA Install Banner ────────────── */
#pwa-banner {
  position: fixed; bottom: 80px; left: 16px; right: 16px;
  background: var(--grad); color: #fff; border-radius: 16px; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 8px 32px rgba(124,58,237,0.4); z-index: 500; animation: slideDown 0.5s ease;
}

</style>
<style>
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { width: 100%; max-width: 440px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .logo-icon { font-size: 48px; margin-bottom: 8px; }
.login-logo h1 { font-size: 26px; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.login-logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }
.login-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
.login-tab { flex: 1; padding: 10px; border-radius: 8px; border: none; font-family: 'Cairo',sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.2s; }
.login-tab.active { background: var(--grad); color: #fff; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
.pass-wrap { position: relative; }
.pass-wrap .form-input { padding-left: 44px; }
.pass-toggle { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text2); font-size: 18px; background: none; border: none; }
.or-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text3); font-size: 12px; }
.or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
.grade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grade-btn { padding: 10px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-family: 'Cairo',sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
.grade-btn.selected { border-color: var(--primary); background: rgba(124,58,237,0.15); color: var(--primary-light); }
.theme-corner { position: fixed; top: 16px; left: 16px; z-index: 100; }
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; opacity: 0.08; animation: float 6s ease-in-out infinite; }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="particles" id="particles"></div>

<div class="theme-corner">
  <button class="theme-toggle" onclick="onToggleTheme()" id="themeBtn">🌙</button>
</div>

<div class="login-wrap">
  <div class="login-card fade-up">
    <div class="login-logo">
      <div class="logo-icon">🎓</div>
      <h1>Make Future Center</h1>
      <p>منصة التعليم الإلكتروني المتكاملة</p>
    </div>

    <div class="glass p-6">
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="login-tab" id="tabSignup" onclick="switchTab('signup')">إنشاء حساب</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="formLogin">
        <div class="form-group">
          <label class="form-label">رقم الموبايل أو اسم المستخدم</label>
          <input type="text" class="form-input" id="loginField" placeholder="01XXXXXXXXX" autocomplete="username" inputmode="tel">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="pass-wrap">
            <input type="password" class="form-input" id="loginPass" placeholder="كلمة المرور" autocomplete="current-password">
            <button class="pass-toggle" onclick="togglePass('loginPass', this)">👁️</button>
          </div>
        </div>
        <button class="btn btn-primary btn-block btn-lg mt-4" id="btnLogin" onclick="doLogin()">
          <span>دخول</span>
          <span>←</span>
        </button>
        <p class="text-center text-sm text-muted mt-3">
          كلمة المرور الافتراضية = رقم موبايلك
        </p>
      </div>

      <!-- SIGNUP FORM -->
      <div id="formSignup" class="hidden">
        <div class="form-group">
          <label class="form-label">الاسم الكامل</label>
          <input type="text" class="form-input" id="suName" placeholder="محمد أحمد" maxlength="100">
        </div>
        <div class="form-group">
          <label class="form-label">رقم موبايل الطالب</label>
          <input type="tel" class="form-input" id="suPhone" placeholder="01XXXXXXXXX" inputmode="tel" maxlength="11">
        </div>
        <div class="form-group">
          <label class="form-label">رقم موبايل ولي الأمر <span class="text-muted">(اختياري)</span></label>
          <input type="tel" class="form-input" id="suParent" placeholder="01XXXXXXXXX" inputmode="tel" maxlength="11">
        </div>
        <div class="form-group">
          <label class="form-label">الصف الدراسي</label>
          <div class="grade-grid" id="gradeGrid">
            <button class="grade-btn" data-grade="3prep" onclick="selectGrade(this)">الثالث الإعدادي</button>
            <button class="grade-btn" data-grade="1sec" onclick="selectGrade(this)">الأول الثانوي</button>
            <button class="grade-btn" data-grade="2sec" onclick="selectGrade(this)">الثاني الثانوي</button>
            <button class="grade-btn" data-grade="3sec" onclick="selectGrade(this)">الثالث الثانوي</button>
          </div>
          <input type="hidden" id="suGrade">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="pass-wrap">
            <input type="password" class="form-input" id="suPass" placeholder="6 أحرف على الأقل" autocomplete="new-password">
            <button class="pass-toggle" onclick="togglePass('suPass', this)">👁️</button>
          </div>
          <p class="text-xs text-muted mt-1">تلقائياً: رقم موبايلك كـ كلمة مرور</p>
        </div>
        <button class="btn btn-primary btn-block btn-lg mt-4" id="btnSignup" onclick="doSignup()">
          <span>إنشاء الحساب</span>
          <span>←</span>
        </button>
      </div>
    </div>

    <p class="text-center text-xs text-muted mt-4" style="opacity:0.5">
      Make Future Center © 2025 — جميع الحقوق محفوظة
    </p>
  </div>

// ─── API Helper ───────────────────────
async function mfFetch(endpoint, options = {}) {
  const token = localStorage.getItem('mf_access_token');
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(`${MF_CONFIG.FN}/${endpoint}`, { ...options, headers });
    const data = await res.json();
    return data;
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function requireAuth(allowedRoles = []) {

}

// ─── Toast Notifications ──────────────
function toast(msg, type = 'info', duration = 3500) {
  const colors = { success: '#10b981', error: '#ef4444', info: '#7c3aed', warn: '#f59e0b' };
  const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:${colors[type]};color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-family:Cairo,sans-serif;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:90vw;text-align:center;direction:rtl;`;
  el.textContent = icons[type] + ' ' + msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(100px)'; setTimeout(() => el.remove(), 300); }, duration);
}

  let ov = document.getElementById('mf-loading');
  if (show && !ov) {
    ov = document.createElement('div');

    ov.innerHTML = '<div style="width:48px;height:48px;border:3px solid rgba(124,58,237,0.3);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite;"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    document.body.appendChild(ov);
  } else if (!show && ov) ov.remove();
}

// ─── Dark Mode ────────────────────────
function initTheme() {
  const saved = localStorage.getItem('mf_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  return saved;
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mf_theme', next);
  return next;
}

// ─── Date Formatting ──────────────────
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('ar-EG', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ─── Number Format ────────────────────
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG'); }

// ─── Debounce ─────────────────────────
function debounce(fn, ms = 300) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
