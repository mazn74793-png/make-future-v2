<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center — تسجيل الدخول</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap');
:root{--primary:#7c3aed;--primary-light:#9d5ff5;--secondary:#06b6d4;--danger:#ef4444;--success:#10b981;--warn:#f59e0b;--grad:linear-gradient(135deg,#7c3aed 0%,#06b6d4 100%);--grad-soft:linear-gradient(135deg,rgba(124,58,237,0.15) 0%,rgba(6,182,212,0.15) 100%);--bg:#0a0f1e;--bg2:#0f172a;--bg3:#1e293b;--bg4:#263147;--surface:rgba(30,41,59,0.8);--surface2:rgba(38,49,71,0.9);--border:rgba(124,58,237,0.2);--border2:rgba(255,255,255,0.06);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--shadow:0 8px 32px rgba(0,0,0,0.4);--glow:0 0 40px rgba(124,58,237,0.3)}
[data-theme="light"]{--bg:#f8fafc;--bg2:#f1f5f9;--bg3:#e2e8f0;--bg4:#cbd5e1;--surface:rgba(255,255,255,0.9);--surface2:rgba(248,250,252,0.95);--border:rgba(124,58,237,0.2);--border2:rgba(0,0,0,0.06);--text:#0f172a;--text2:#475569;--text3:#94a3b8;--shadow:0 4px 20px rgba(0,0,0,0.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
a{color:inherit;text-decoration:none}img{max-width:100%}
.bg-mesh{position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(124,58,237,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,0.08) 0%,transparent 60%),var(--bg)}
.glass{background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;user-select:none;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.4)}.btn-primary:hover{box-shadow:0 8px 30px rgba(124,58,237,0.5);transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-lg{padding:14px 32px;font-size:16px;border-radius:14px}.btn-block{width:100%}
.form-group{margin-bottom:16px}.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.form-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;transition:all .2s;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,0.15);background:var(--bg2)}
.form-input::placeholder{color:var(--text3)}
.field-err{font-size:11px;color:#f87171;margin-top:4px;min-height:16px;font-weight:600}
.form-input.err-field{border-color:#f87171!important;background:rgba(248,113,113,.05)}
.form-input.ok-field{border-color:#10b981!important}
.hidden{display:none!important}.mt-4{margin-top:16px}.mt-2{margin-top:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.8}}
@keyframes shimmer{to{background-position:200% center}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fade-up{animation:fadeUp .5s ease both}
.theme-toggle{width:40px;height:40px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.theme-toggle:hover{background:var(--bg4);transform:scale(1.05)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:440px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .logo-icon{font-size:48px;margin-bottom:8px}
.login-logo h1{font-size:26px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.login-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:24px}
.login-tab{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s}
.login-tab.active{background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.3)}
.pass-wrap{position:relative}.pass-wrap .form-input{padding-left:44px}
.pass-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text2);font-size:18px;background:none;border:none}
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grade-btn{padding:10px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.grade-btn.selected{border-color:var(--primary);background:rgba(124,58,237,0.15);color:var(--primary-light)}
.theme-corner{position:fixed;top:16px;left:16px;z-index:100}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:.08;animation:float 6s ease-in-out infinite}
.p-6{padding:24px}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="particles" id="particles"></div>
<div class="theme-corner">
  <button class="theme-toggle" onclick="onToggleTheme()" id="themeBtn">🌙</button>
</div>
<div class="login-wrap">
  <div class="login-card fade-up">
    <div class="login-logo">
      <div class="logo-icon">🎓</div>
      <h1>Make Future Center</h1>
      <p>منصة التعليم الإلكتروني المتكاملة</p>
    </div>
    <div class="glass p-6">
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="login-tab" id="tabSignup" onclick="switchTab('signup')">إنشاء حساب</button>
      </div>
      <!-- LOGIN -->
      <div id="formLogin">
        <div class="form-group">
          <label class="form-label">رقم الموبايل أو اسم المستخدم</label>
          <input type="text" class="form-input" id="loginField" placeholder="01XXXXXXXXX" autocomplete="username" inputmode="tel">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="pass-wrap">
            <input type="password" class="form-input" id="loginPass" placeholder="كلمة المرور" autocomplete="current-password">
            <button class="pass-toggle" onclick="togglePass('loginPass',this)">👁️</button>
          </div>
        </div>
        <button class="btn btn-primary btn-block btn-lg mt-4" id="btnLogin" onclick="doLogin()">
          <span>دخول</span><span>←</span>
        </button>
        <div style="text-align:center;margin-top:14px">
          <button onclick="resetViaWhatsapp()" style="background:none;border:none;color:#64748b;font-size:12px;cursor:pointer;font-family:Cairo,sans-serif;text-decoration:underline">
            🔑 نسيت كلمة المرور؟ تواصل مع الأدمن
          </button>
        </div>
      </div>
      <!-- SIGNUP -->
      <div id="formSignup" class="hidden">
        <div id="signupStep1">
          <div class="form-group">
            <label class="form-label">الاسم الكامل <span style="color:#f87171">*</span></label>
            <input type="text" class="form-input" id="suName" placeholder="مثال: محمد أحمد علي" maxlength="100" oninput="clearErr('suName')">
            <div class="field-err" id="err-suName"></div>
          </div>
          <div class="form-group">
            <label class="form-label">رقم موبايل الطالب <span style="color:#f87171">*</span></label>
            <input type="tel" class="form-input" id="suPhone" placeholder="01XXXXXXXXX" inputmode="tel" maxlength="11" oninput="formatPhone(this);clearErr('suPhone')">
            <div class="field-err" id="err-suPhone"></div>
          </div>
          <div class="form-group">
            <label class="form-label">رقم واتساب ولي الأمر <span style="color:#f87171">*</span></label>
            <input type="tel" class="form-input" id="suParent" placeholder="01XXXXXXXXX" inputmode="tel" maxlength="11" oninput="formatPhone(this);clearErr('suParent')">
            <div style="font-size:11px;color:#64748b;margin-top:4px">📱 للتواصل في حالة مشاكل الحساب</div>
            <div class="field-err" id="err-suParent"></div>
          </div>
          <div class="form-group">
            <label class="form-label">الصف الدراسي <span style="color:#f87171">*</span></label>
            <div class="grade-grid" id="gradeGrid">
              <button class="grade-btn" data-grade="3prep" onclick="selectGrade(this)">الثالث الإعدادي</button>
              <button class="grade-btn" data-grade="1sec" onclick="selectGrade(this)">الأول الثانوي</button>
              <button class="grade-btn" data-grade="2sec" onclick="selectGrade(this)">الثاني الثانوي</button>
              <button class="grade-btn" data-grade="3sec" onclick="selectGrade(this)">الثالث الثانوي</button>
            </div>
            <div class="field-err" id="err-grade"></div>
            <input type="hidden" id="suGrade">
          </div>
          <button class="btn btn-primary btn-block btn-lg mt-4" onclick="goToStep2()"><span>التالي</span><span>←</span></button>
        </div>
        <div id="signupStep2" class="hidden">
          <div style="background:var(--bg3);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
            <div style="font-size:22px">👤</div>
            <div>
              <div style="font-size:13px;font-weight:700" id="stepSummaryName"></div>
              <div style="font-size:12px;color:var(--text2)" id="stepSummaryPhone"></div>
            </div>
            <button onclick="goBackStep1()" style="margin-right:auto;background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;font-family:Cairo,sans-serif">تعديل ✏️</button>
          </div>
          <div class="form-group">
            <label class="form-label">كلمة المرور <span style="color:#f87171">*</span></label>
            <div class="pass-wrap">
              <input type="password" class="form-input" id="suPass" placeholder="٨ أحرف على الأقل" autocomplete="new-password" oninput="checkPassStrength(this.value);clearErr('suPass')">
              <button class="pass-toggle" onclick="togglePass('suPass',this)">👁️</button>
            </div>
            <div id="passStrengthWrap" style="margin-top:8px;display:none">
              <div style="height:4px;background:var(--bg3);border-radius:4px;overflow:hidden">
                <div id="passStrengthBar" style="height:100%;border-radius:4px;transition:all .3s;width:0%"></div>
              </div>
              <div id="passStrengthLbl" style="font-size:11px;margin-top:4px;color:#64748b"></div>
            </div>
            <div class="field-err" id="err-suPass"></div>
          </div>
          <div class="form-group">
            <label class="form-label">تأكيد كلمة المرور <span style="color:#f87171">*</span></label>
            <div class="pass-wrap">
              <input type="password" class="form-input" id="suPassConfirm" placeholder="أعد كتابة كلمة المرور" autocomplete="new-password" oninput="clearErr('suPassConfirm')">
              <button class="pass-toggle" onclick="togglePass('suPassConfirm',this)">👁️</button>
            </div>
            <div class="field-err" id="err-suPassConfirm"></div>
          </div>
          <button class="btn btn-primary btn-block btn-lg mt-4" id="btnSignup" onclick="doSignup()"><span>إنشاء الحساب</span><span>←</span></button>
          <button onclick="goBackStep1()" class="btn btn-secondary btn-block mt-2" style="font-size:12px">→ رجوع</button>
        </div>
      </div>
    </div>
    <p style="text-align:center;font-size:11px;color:var(--text3);margin-top:16px;opacity:.5">Make Future Center © 2025 — جميع الحقوق محفوظة</p>
  </div>
</div>
<script>
// ══════════════════════════════════════════
// ✅ CORRECT Supabase Config — dfbtibhxmraegjvztuch
// ══════════════════════════════════════════
const MF_CONFIG = {
  SUPABASE_URL: 'https://dfbtibhxmraegjvztuch.supabase.co',
  ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYnRpYmh4bXJhZWdqdnp0dWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTQ3NzksImV4cCI6MjA4ODg3MDc3OX0.oAI4vLCujDGZcVg7BwBNNjv_jYA7bwwneU9q2SQYiyI',
  FN: 'https://dfbtibhxmraegjvztuch.supabase.co/functions/v1',
  WA_ADMIN: '201210575530',
  PAYMENT_PHONE: '01210575530'
};

async function mfFetch(endpoint, options={}) {
  const token = localStorage.getItem('mf_access_token');
  const headers = {'Content-Type':'application/json','apikey':MF_CONFIG.ANON_KEY,...(options.headers||{})};
  if(token && token!=='null' && token.length>20) headers['Authorization']=`Bearer ${token}`;
  try {
    const res = await fetch(`${MF_CONFIG.FN}/${endpoint}`,{...options,headers});
    const data = await res.json();
    return data;
  } catch(e) { return {ok:false,error:e.message}; }
}
function getUser(){try{return JSON.parse(localStorage.getItem('mf_user')||'null')}catch{return null}}
function getToken(){return localStorage.getItem('mf_access_token')}
function logout(){['mf_user','mf_access_token','mf_refresh_token','mf_selected_course'].forEach(k=>localStorage.removeItem(k));window.location.href='login.html'}
function requireAuth(roles=[]){const u=getUser();if(!u){window.location.href='login.html';return null}if(roles.length&&!roles.includes(u.role)){window.location.href=u.role==='student'?'student.html':'admin.html';return null}return u}
function isAdmin(u){return['admin','superadmin','course_admin'].includes(u?.role)}
function isSuperAdmin(u){return u?.role==='superadmin'}
function toast(msg,type='info',duration=3500){
  const colors={success:'#10b981',error:'#ef4444',info:'#7c3aed',warn:'#f59e0b'};
  const icons={success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:${colors[type]};color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-family:Cairo,sans-serif;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;text-align:center;direction:rtl;font-weight:700`;
  el.textContent=icons[type]+' '+msg;document.body.appendChild(el);
  requestAnimationFrame(()=>{el.style.transform='translateX(-50%) translateY(0)'});
  setTimeout(()=>{el.style.transform='translateX(-50%) translateY(100px)';setTimeout(()=>el.remove(),300)},duration);
}
function showLoading(show=true){let ov=document.getElementById('mf-loading');if(show&&!ov){ov=document.createElement('div');ov.id='mf-loading';ov.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.7);backdrop-filter:blur(4px);z-index:9998;display:flex;align-items:center;justify-content:center';ov.innerHTML='<div style="width:48px;height:48px;border:3px solid rgba(124,58,237,.3);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';document.body.appendChild(ov)}else if(!show&&ov)ov.remove()}
function initTheme(){const s=localStorage.getItem('mf_theme')||'dark';document.documentElement.setAttribute('data-theme',s);return s}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);return n}
const GRADE_LABELS={'3prep':'الثالث الإعدادي','1sec':'الأول الثانوي','2sec':'الثاني الثانوي','3sec':'الثالث الثانوي'};
const GRADE_OPTIONS=Object.entries(GRADE_LABELS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
function gradeLabel(g){return GRADE_LABELS[g]||g}
function fmtDate(d){if(!d)return'';return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})}
function fmtDateTime(d){if(!d)return'';return new Date(d).toLocaleString('ar-EG',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function fmtNum(n){return Number(n||0).toLocaleString('ar-EG')}
function escapeHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function debounce(fn,ms=300){let t;return(...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms)}}
</script>
<script>
initTheme();
updateThemeBtn();
(function(){
  const p=document.getElementById('particles');
  for(let i=0;i<12;i++){const el=document.createElement('div');el.className='particle';const size=Math.random()*80+20;el.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${Math.random()>.5?'#7c3aed':'#06b6d4'};animation-delay:${Math.random()*4}s;animation-duration:${4+Math.random()*4}s;`;p.appendChild(el)}
})();
function updateThemeBtn(){const t=document.documentElement.getAttribute('data-theme');document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙'}
function onToggleTheme(){toggleTheme();updateThemeBtn()}
function switchTab(tab){
  document.getElementById('formLogin').classList.toggle('hidden',tab!=='login');
  document.getElementById('formSignup').classList.toggle('hidden',tab!=='signup');
  document.getElementById('tabLogin').classList.toggle('active',tab==='login');
  document.getElementById('tabSignup').classList.toggle('active',tab!=='login');
}
function togglePass(id,btn){const inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.textContent='🙈'}else{inp.type='password';btn.textContent='👁️'}}
let selectedGrade='';
function selectGrade(btn){document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedGrade=btn.dataset.grade;document.getElementById('suGrade').value=selectedGrade}
async function doLogin(){
  const login=document.getElementById('loginField').value.trim();
  const password=document.getElementById('loginPass').value;
  if(!login){toast('أدخل رقم الموبايل أو اسم المستخدم','warn');return}
  if(/^[0-9]/.test(login)&&!/^01[0-9]{9}$/.test(login)){toast('رقم الموبايل غير صحيح — يجب أن يبدأ بـ 01 ويكون 11 رقم','error');return}
  if(!password){toast('أدخل كلمة المرور','warn');return}
  const btn=document.getElementById('btnLogin');btn.disabled=true;btn.textContent='⏳ جاري الدخول...';
  const res=await mfFetch('auth-login',{method:'POST',body:JSON.stringify({login,password})});
  btn.disabled=false;btn.innerHTML='<span>دخول</span><span>←</span>';
  if(!res.ok){toast(res.error||'بيانات غلط','error');return}
  localStorage.setItem('mf_user',JSON.stringify(res.user));
  localStorage.setItem('mf_access_token',res.access_token);
  localStorage.setItem('mf_refresh_token',res.refresh_token);
  toast('أهلاً '+(res.user?.name||res.user?.full_name||'')+' 👋','success');
  setTimeout(()=>{window.location.href=res.user?.role==='student'?'student.html':'admin.html'},800);
}
function formatPhone(el){el.value=el.value.replace(/[^0-9]/g,'').slice(0,11)}
function showErr(id,msg){const el=document.getElementById('err-'+id);const inp=document.getElementById(id);if(el)el.textContent=msg;if(inp)inp.classList.add('err-field')}
function clearErr(id){const el=document.getElementById('err-'+id);const inp=document.getElementById(id);if(el)el.textContent='';if(inp)inp.classList.remove('err-field')}
function markOk(id){const inp=document.getElementById(id);if(inp){inp.classList.remove('err-field');inp.classList.add('ok-field')}}
function checkPassStrength(val){
  const wrap=document.getElementById('passStrengthWrap');const bar=document.getElementById('passStrengthBar');const lbl=document.getElementById('passStrengthLbl');
  if(!wrap)return;wrap.style.display=val.length>0?'':'none';
  let score=0;if(val.length>=8)score++;if(val.length>=12)score++;if(/[A-Za-z]/.test(val))score++;if(/[0-9]/.test(val))score++;if(/[^A-Za-z0-9]/.test(val))score++;
  const levels=[{w:'20%',c:'#ef4444',t:'ضعيفة جداً'},{w:'40%',c:'#f97316',t:'ضعيفة'},{w:'60%',c:'#fbbf24',t:'متوسطة'},{w:'80%',c:'#84cc16',t:'جيدة'},{w:'100%',c:'#10b981',t:'قوية جداً ✅'}];
  const lv=levels[Math.min(score,4)];bar.style.width=lv.w;bar.style.background=lv.c;lbl.textContent='قوة كلمة المرور: '+lv.t;lbl.style.color=lv.c;
}
function goToStep2(){
  const name=document.getElementById('suName').value.trim();const phone=document.getElementById('suPhone').value.trim();const parent=document.getElementById('suParent').value.trim();let ok=true;
  if(!name||name.length<3){showErr('suName','أدخل الاسم الكامل (3 أحرف على الأقل)');ok=false}else{clearErr('suName');markOk('suName')}
  if(!/^01[0-9]{9}$/.test(phone)){showErr('suPhone','رقم غير صحيح — يجب أن يبدأ بـ 01 ويكون 11 رقم');ok=false}else{clearErr('suPhone');markOk('suPhone')}
  if(!/^01[0-9]{9}$/.test(parent)){showErr('suParent','رقم واتساب ولي الأمر غير صحيح');ok=false}else{clearErr('suParent');markOk('suParent')}
  if(!selectedGrade){showErr('grade','اختر الصف الدراسي');ok=false}else{clearErr('grade')}
  if(!ok)return;
  document.getElementById('stepSummaryName').textContent=name;
  document.getElementById('stepSummaryPhone').textContent=phone+' | '+document.querySelector('.grade-btn.selected')?.textContent;
  document.getElementById('signupStep1').classList.add('hidden');document.getElementById('signupStep2').classList.remove('hidden');document.getElementById('suPass').focus();
}
function goBackStep1(){document.getElementById('signupStep2').classList.add('hidden');document.getElementById('signupStep1').classList.remove('hidden')}
async function doSignup(){
  const full_name=document.getElementById('suName').value.trim();const phone_student=document.getElementById('suPhone').value.trim();const phone_parent=document.getElementById('suParent').value.trim();const grade=selectedGrade;const password=document.getElementById('suPass').value;const passConfirm=document.getElementById('suPassConfirm').value;let ok=true;
  if(!password||password.length<8){showErr('suPass','كلمة المرور أقل من 8 أحرف');ok=false}
  if(password!==passConfirm){showErr('suPassConfirm','كلمتا المرور غير متطابقتين ❌');ok=false}
  if(!ok)return;
  const btn=document.getElementById('btnSignup');btn.disabled=true;btn.innerHTML='<span>⏳ جاري إنشاء الحساب...</span>';
  const res=await mfFetch('auth-signup',{method:'POST',body:JSON.stringify({full_name,phone_student,phone_parent,grade,password})});
  btn.disabled=false;btn.innerHTML='<span>إنشاء الحساب</span><span>←</span>';
  if(!res.ok){const errMsg=res.error||'فشل إنشاء الحساب';if(errMsg.includes('مسجل')||errMsg.includes('exist')){toast('هذا الرقم مسجل مسبقاً — جرب تسجيل الدخول 🔑','warn',5000);switchTab('login');document.getElementById('loginField').value=phone_student}else{toast(errMsg,'error')}return}
  toast('تم إنشاء الحساب بنجاح! أهلاً '+full_name+' 🎉','success',4000);switchTab('login');document.getElementById('loginField').value=phone_student;
}
function resetViaWhatsapp(){const phone=document.getElementById('loginField').value.trim();const msg=phone&&/^01[0-9]{9}$/.test(phone)?`مرحباً، أريد إعادة تعيين كلمة المرور لرقمي ${phone} على منصة Make Future`:`مرحباً، أريد إعادة تعيين كلمة المرور على منصة Make Future`;window.open(`https://wa.me/201210575530?text=${encodeURIComponent(msg)}`,'_blank')}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(!document.getElementById('formLogin').classList.contains('hidden'))doLogin();else doSignup()}});
(function checkSession(){
  const u=getUser();const token=getToken();if(!u||!token||token==='null')return;
  try{const payload=JSON.parse(atob(token.split('.')[1]));const now=Math.floor(Date.now()/1000);if(payload.exp&&payload.exp<now){localStorage.removeItem('mf_user');localStorage.removeItem('mf_access_token');localStorage.removeItem('mf_refresh_token');return}window.location.href=u.role==='student'?'student.html':'admin.html'}catch(e){localStorage.removeItem('mf_user');localStorage.removeItem('mf_access_token');localStorage.removeItem('mf_refresh_token')}
})();
</script>
