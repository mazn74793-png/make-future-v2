<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center — تغيير كلمة المرور</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<style>
.pw-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.pw-card { width: 100%; max-width: 420px; }
.pass-wrap { position: relative; }
.pass-wrap .form-input { padding-left: 44px; }
.pass-toggle { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text2); font-size: 18px; background: none; border: none; }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<nav class="navbar">
  <button class="btn btn-sm btn-secondary" onclick="history.back()">← رجوع</button>
  <span class="nav-logo">🔒 كلمة المرور</span>
  <button class="theme-toggle" onclick="onToggleTheme()" id="themeBtn">🌙</button>
</nav>
<div class="pw-wrap">
  <div class="pw-card fade-up">
    <div class="glass p-6">
      <h2 class="text-center mb-4" style="font-size:22px">🔐 تغيير كلمة المرور</h2>
      <div class="form-group">
        <label class="form-label">كلمة المرور الجديدة</label>
        <div class="pass-wrap">
          <input type="password" class="form-input" id="newPass" placeholder="6 أحرف على الأقل">
          <button class="pass-toggle" onclick="togglePass('newPass',this)">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">تأكيد كلمة المرور</label>
        <div class="pass-wrap">
          <input type="password" class="form-input" id="confirmPass" placeholder="أعد كتابة كلمة المرور">
          <button class="pass-toggle" onclick="togglePass('confirmPass',this)">👁️</button>
        </div>
      </div>
      <button class="btn btn-primary btn-block btn-lg mt-4" id="btnSave" onclick="doChange()">💾 حفظ كلمة المرور</button>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script>
initTheme();
updateThemeBtn();
const user = requireAuth();
function updateThemeBtn(){ document.getElementById('themeBtn').textContent = document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'; }
function onToggleTheme(){ toggleTheme(); updateThemeBtn(); }
function togglePass(id,btn){ const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='password'?'👁️':'🙈'; }
async function doChange(){
  const np=document.getElementById('newPass').value;
  const cp=document.getElementById('confirmPass').value;
  if(!np||!cp){ toast('أدخل كلمة المرور','warn'); return; }
  if(np.length<6){ toast('كلمة المرور أقل من 6 أحرف','warn'); return; }
  if(np!==cp){ toast('كلمتا المرور غير متطابقتين','error'); return; }
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='⏳ جاري الحفظ...';
  const res=await mfFetch('change-password',{method:'POST',body:JSON.stringify({user_id:user.id,new_password:np})});
  btn.disabled=false; btn.innerHTML='💾 حفظ كلمة المرور';
  if(!res.ok){ toast(res.error||'فشل الحفظ','error'); return; }
  toast('تم تغيير كلمة المرور بنجاح ✅','success');
  setTimeout(()=>logout(),2000);
}
</script>
</body>
</html>
