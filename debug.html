<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 MF Debug Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060b18;color:#e2e8f0;font-family:'Segoe UI',monospace;font-size:13px;min-height:100vh}
:root{--ok:#22d3ee;--err:#f87171;--warn:#fbbf24;--info:#a78bfa;--bg2:#0d1526;--bg3:#151f35;--bg4:#1a2740;--border:#1e3a5f}
header{background:linear-gradient(135deg,#1a0533,#0a1f3a);padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:15px;background:linear-gradient(90deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.controls{display:flex;gap:5px;flex-wrap:wrap}
button{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s}
.btn-main{background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff}
.btn-fix{background:linear-gradient(135deg,#059669,#0284c7);color:#fff;display:none}
.btn-sec{background:var(--bg3);color:#94a3b8;border:1px solid var(--border)}
.btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
#progWrap{background:var(--bg2);padding:6px 18px;border-bottom:1px solid var(--border);display:none}
#progLbl{font-size:11px;color:#64748b;margin-bottom:3px}
#progBar{height:3px;background:var(--bg3);border-radius:3px;overflow:hidden}
#progFill{height:100%;background:linear-gradient(90deg,#7c3aed,#22d3ee);width:0%;transition:width .25s;border-radius:3px}
#alertBox{margin:12px 18px;padding:14px 18px;border-radius:10px;border:2px solid #f87171;background:rgba(248,113,113,.08);display:none}
#alertBox h3{color:#f87171;margin-bottom:6px;font-size:14px}
#alertBox p{color:#94a3b8;font-size:12px;line-height:1.6}
#alertBox a{color:#22d3ee;text-decoration:underline}
#summary{margin:10px 18px;border-radius:10px;padding:12px 16px;border:1px solid var(--border);display:none;background:var(--bg2)}
main{padding:10px 18px;display:grid;gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-hdr{padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;background:var(--bg3)}
.card-hdr:hover{background:var(--bg4)}
.card-ico{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.card-ttl{flex:1;font-weight:700;font-size:13px}
.card-bdg{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
.bok{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.25)}
.berr{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.25)}
.bwarn{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.bgray{background:var(--bg3);color:#64748b;border:1px solid var(--border)}
.card-body{padding:10px 13px;display:none}
.card-body.open{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
tr{border-bottom:1px solid var(--bg3)}tr:last-child{border:none}
td{padding:5px 7px;vertical-align:top}
td:first-child{color:#64748b;width:185px;white-space:nowrap;flex-shrink:0}
td:last-child{word-break:break-all}
.ok{color:#22d3ee}.err{color:#f87171}.warn{color:#fbbf24}.info{color:#a78bfa}
.fix-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;background:rgba(5,150,105,.15);color:#34d399;border:1px solid rgba(5,150,105,.3);cursor:pointer;margin-top:8px}
.fix-btn:hover{background:rgba(5,150,105,.3)}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:var(--bg4);color:#94a3b8;margin-right:2px}
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1>🔍 Make Future Center — Debug Pro v2</h1>
  <div class="controls">
    <button class="btn-main" onclick="runAll()">▶ فحص شامل</button>
    <button class="btn-fix" id="fixAllBtn" onclick="fixAll()">🔧 إصلاح الكل</button>
    <button class="btn-sec" onclick="fixSession()">🔑 تجديد جلسة</button>
    <button class="btn-sec" onclick="clearSess()">🚪 مسح جلسة</button>
    <button class="btn-danger" onclick="clearAll()">🗑 مسح</button>
  </div>
</header>

<!-- تحذير لو شغال من file:// -->
<div id="alertBox">
  <h3>⚠️ الملف مش شغال محلياً!</h3>
  <p>
    الـ debug tool شغال من جهازك مباشرة (<code>file://</code>) — ده بيمنع كل الـ requests بسبب CORS.<br><br>
    لازم ترفع الملف على Vercel وتفتحه من:<br>
    <a id="vercelLink" href="#" target="_blank"></a><br><br>
    أو افتح الملف بـ: <strong>Live Server</strong> في VS Code بدلاً من double-click.
  </p>
</div>

<div id="progWrap">
  <div id="progLbl">جاري الفحص...</div>
  <div id="progBar"><div id="progFill"></div></div>
</div>
<div id="summary"></div>
<main id="main"></main>

<script>
// ─── CONFIG ───────────────────────────────────────────
const C = {
  SB:   'https://pjskzfyjzvibqglhdykc.supabase.co',
  FN:   'https://pjskzfyjzvibqglhdykc.supabase.co/functions/v1',
  ANON: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqc2t6ZnlqenZpYnFnbGhkeWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNjU4NTcsImV4cCI6MjA4ODY0MTg1N30.AqdIBX-6tP9nMRVao4X7A1aV5L4J7mTiNC1RWeWf7LI',
  PHONE: '01210575530',
  PASS:  'momomo',
  // ✅ FIX: تم تحديث الـ URL من GitHub Pages لـ Vercel
  SITE: 'https://make-future-seven.vercel.app',
  PAGES: [
    'index.html','login.html','admin.html','student.html',
    'course.html','payment.html','change-password.html',
    'debug.html','manifest.json'
  ],
  FNS: [
    'auth-login','auth-signup','admin-stats','admin-courses',
    'admin-schedules','course-videos','admin-payments','admin-users',
    'admin-reset-password','change-password','student-courses',
    'check-enrollment','create-payment','video-progress','video-comments',
    'coupons','user-notifications','certificates','quizzes','quiz-attempts',
    'get-video-url','r2-multipart','upload-image','send-otp',
    'create-admin','security-helpers','student-payments','course-admin-students'
  ],
};

let RESULTS = [], FIXES = [], isLocalFile = false;

// ─── DETECT LOCAL FILE ────────────────────────────────
function detectEnv() {
  isLocalFile = window.location.protocol === 'file:';
  if(isLocalFile) {
    document.getElementById('alertBox').style.display = 'block';
    const lnk = document.getElementById('vercelLink');
    lnk.href = C.SITE + '/debug.html';
    lnk.textContent = C.SITE + '/debug.html';
  }
}

// ─── HELPERS ──────────────────────────────────────────
const gT = () => localStorage.getItem('mf_access_token');
const gU = () => { try{ return JSON.parse(localStorage.getItem('mf_user')||'null'); }catch{ return null; } };
const gR = () => localStorage.getItem('mf_refresh_token');
const decJWT = t => { try{ return JSON.parse(atob(t.split('.')[1])); }catch{ return null; } };
const sleep = ms => new Promise(r => setTimeout(r, ms));
const setP = (p,l) => { document.getElementById('progFill').style.width=p+'%'; if(l) document.getElementById('progLbl').textContent=l; };

async function api(ep, opts={}, anon=false) {
  const token=gT(); const valid=token&&token!=='null'&&token.length>20;
  const headers={'Content-Type':'application/json','apikey':C.ANON,'Authorization':`Bearer ${!anon&&valid?token:C.ANON}`};
  const t0=Date.now();
  try {
    const r = await fetch(`${C.FN}/${ep}`, {...opts, headers});
    const ms = Date.now()-t0;
    let data; try{ data=await r.json(); }catch{ data={raw:'non-json'}; }
    return {status:r.status, ok:r.ok, data, ms};
  } catch(e) {
    return {status:0, ok:false, data:{error:e.message}, ms:Date.now()-t0};
  }
}

// ─── UI ───────────────────────────────────────────────
function addCard(id, icon, title) {
  const d = document.createElement('div');
  d.className='card'; d.id='card-'+id;
  d.innerHTML=`
    <div class="card-hdr" onclick="tog('${id}')">
      <span class="card-ico">${icon}</span>
      <span class="card-ttl">${title}</span>
      <span class="card-bdg bgray" id="bdg-${id}"><span class="spin"></span></span>
    </div>
    <div class="card-body" id="bdy-${id}"><div class="info" style="font-size:12px">جاري...</div></div>`;
  document.getElementById('main').appendChild(d);
}
function tog(id){ document.getElementById('bdy-'+id).classList.toggle('open'); }
function setBadge(id,s,t){ const c=s==='ok'?'bok':s==='err'?'berr':s==='warn'?'bwarn':'bgray'; document.getElementById('bdg-'+id).className=`card-bdg ${c}`; document.getElementById('bdg-'+id).textContent=t; if(s==='err') document.getElementById('bdy-'+id).classList.add('open'); }
function setBody(id,h){ document.getElementById('bdy-'+id).innerHTML=h; }
function row(l,v,s=''){ const c=s==='ok'?'ok':s==='err'?'err':s==='warn'?'warn':s==='info'?'info':''; return `<tr><td>${l}</td><td class="${c}">${v}</td></tr>`; }
function tbl(...rows){ return `<table>${rows.join('')}</table>`; }
function fixBt(label,fn){ return `<button class="fix-btn" onclick="${fn}">🔧 ${label}</button>`; }

function clearAll(){ document.getElementById('main').innerHTML=''; document.getElementById('summary').style.display='none'; document.getElementById('progWrap').style.display='none'; document.getElementById('fixAllBtn').style.display='none'; RESULTS=[]; FIXES=[]; setP(0); }
function clearSess(){ ['mf_user','mf_access_token','mf_refresh_token','mf_selected_course'].forEach(k=>localStorage.removeItem(k)); alert('✅ تم مسح الجلسة'); }

// ─── FIX SESSION ──────────────────────────────────────
async function fixSession(silent=false) {
  const r = await api('auth-login',{method:'POST',body:JSON.stringify({login:C.PHONE,password:C.PASS})},true);
  if(r.data?.ok) {
    localStorage.setItem('mf_access_token',r.data.access_token);
    localStorage.setItem('mf_refresh_token',r.data.refresh_token);
    localStorage.setItem('mf_user',JSON.stringify(r.data.user));
    if(!silent) alert('✅ تم تجديد الجلسة!');
    return true;
  } else {
    if(!silent) alert('❌ فشل: '+JSON.stringify(r.data));
    return false;
  }
}

async function fixAll() { for(const f of FIXES) await f(); alert('✅ تم تطبيق الإصلاحات — أعد الفحص'); }

// ─── RUN ALL ──────────────────────────────────────────
async function runAll() {
  clearAll();
  detectEnv();

  if(isLocalFile) {
    document.getElementById('progWrap').style.display='none';
    return;
  }

  document.getElementById('progWrap').style.display='block';

  // تجديد الجلسة تلقائي أول حاجة
  await fixSession(true);

  const checks = [
    ['session',  '🔑', 'الجلسة & التوكن',          chkSession],
    ['connect',  '🌐', 'الاتصال بـ Supabase',       chkConnect],
    ['login',    '🔐', 'auth-login',                chkLogin],
    ['signup',   '📝', 'auth-signup',               chkSignup],
    ['stats',    '📊', 'admin-stats',               chkStats],
    ['courses',  '📚', 'admin-courses',             chkCourses],
    ['sched',    '📅', 'admin-schedules',           chkSchedules],
    ['pays',     '💳', 'admin-payments',            chkPayments],
    ['users',    '👥', 'admin-users',               chkUsers],
    ['scourses', '🎓', 'student-courses',           chkStudentCourses],
    ['vidcoms',  '💬', 'video-comments',            chkVideoComments],
    ['notifs',   '🔔', 'user-notifications',        chkNotifs],
    ['certs',    '🏅', 'certificates',              chkCerts],
    ['coupons',  '🎫', 'coupons',                   chkCoupons],
    ['quizzes',  '📝', 'quizzes',                   chkQuizzes],
    ['imgup',    '🖼️', 'upload-image',              chkImageUpload],
    ['r2',       '⬆️', 'رفع الفيديو R2',            chkR2],
    ['pwa',      '📱', 'PWA & manifest.json',       chkPWA],
    ['pages',    '📄', 'ملفات Vercel',              chkPages],
    ['fnlist',   '⚙️', 'قائمة الـ Functions',       chkFnList],
    ['perf',     '⚡', 'الأداء',                    chkPerf],
  ];

  checks.forEach(([id,icon,title]) => addCard(id, icon, title));

  for(let i=0; i<checks.length; i++) {
    const [id,,title,fn] = checks[i];
    setP(Math.round(i/checks.length*95), `فحص: ${title}`);
    try{ await fn(); } catch(e){ setBadge(id,'err','❌ خطأ'); setBody(id,tbl(row('استثناء',e.message,'err'))); RESULTS.push({id,s:'err',name:title}); }
    await sleep(40);
  }

  setP(100, 'اكتمل الفحص ✅');
  showSummary();
  if(FIXES.length) document.getElementById('fixAllBtn').style.display='inline-flex';
}

// ═══════════════════════════════════════════════════════
//  INDIVIDUAL CHECKS
// ═══════════════════════════════════════════════════════

async function chkSession() {
  const token=gT(), user=gU(), refresh=gR();
  let rows=[], s='ok';
  if(user){ rows.push(row('المستخدم',`${user.full_name} <span class="tag">${user.role}</span>`,'ok')); rows.push(row('ID',user.id,'info')); rows.push(row('الصف',user.grade||'—','info')); }
  else { rows.push(row('المستخدم','❌ مفيش user في localStorage','err')); s='err'; }
  if(token&&token!=='null'&&token.length>20) {
    const p=decJWT(token);
    if(p){ const rem=p.exp-Math.floor(Date.now()/1000); rows.push(row('Token',rem>0?`✅ صالح — ينتهي بعد ${Math.floor(rem/60)} دقيقة`:`❌ منتهي منذ ${Math.floor(-rem/60)} دقيقة`,rem>0?'ok':'err')); if(rem<=0){s='err';FIXES.push(()=>fixSession(true));} }
    else { rows.push(row('Token','❌ JWT تالف','err')); s='err'; }
    const r=await fetch(`${C.SB}/auth/v1/user`,{headers:{'Authorization':`Bearer ${token}`,'apikey':C.ANON}});
    const d=await r.json().catch(()=>({}));
    rows.push(row('Supabase Auth',r.ok&&d.id?'✅ مقبول':'❌ مرفوض',r.ok&&d.id?'ok':'err'));
    if(!r.ok){s='err';}
  } else { rows.push(row('Token','❌ مفيش','err')); s='err'; }
  rows.push(row('Refresh',refresh&&refresh!=='null'?'✅ موجود':'⚠️ مفيش',refresh?'ok':'warn'));
  let html=tbl(...rows);
  if(s==='err') html+=fixBt('تجديد الجلسة','fixSession()');
  setBody('session',html); setBadge('session',s,s==='ok'?'✅ سليم':'❌ خطأ');
  RESULTS.push({id:'session',s,name:'الجلسة'});
}

async function chkConnect() {
  const t0=Date.now(); let rows=[], s='ok';
  try{
    const r=await fetch(`${C.SB}/rest/v1/`,{headers:{'apikey':C.ANON}});
    const ms=Date.now()-t0;
    rows.push(row('الاتصال','✅ متصل','ok'));
    rows.push(row('Latency',`${ms}ms`,ms<500?'ok':ms<1500?'warn':'err'));
    rows.push(row('Status',r.status,r.ok?'ok':'warn'));
    // فحص Vercel كمان
    const vt0=Date.now();
    const vr=await fetch(C.SITE,{method:'HEAD',cache:'no-store'}).catch(()=>null);
    const vms=Date.now()-vt0;
    rows.push(row('Vercel',vr&&vr.ok?`✅ ${vms}ms`:vr?`⚠️ ${vr.status}`:' ❌ فشل',vr&&vr.ok?'ok':vr?'warn':'err'));
  }catch(e){ rows.push(row('الاتصال',`❌ ${e.message}`,'err')); s='err'; }
  setBody('connect',tbl(...rows)); setBadge('connect',s,s==='ok'?'✅ متصل':'❌ فشل');
  RESULTS.push({id:'connect',s,name:'الاتصال'});
}

async function chkLogin() {
  let rows=[], s='ok';
  const r=await api('auth-login',{method:'POST',body:JSON.stringify({login:C.PHONE,password:C.PASS})},true);
  rows.push(row('HTTP',r.status,r.status===200?'ok':'err'));
  rows.push(row('Latency',r.ms+'ms',r.ms<2000?'ok':'warn'));
  if(r.data?.ok){
    rows.push(row('Login','✅ يشتغل','ok'));
    rows.push(row('access_token',r.data.access_token?'✅ موجود':'❌ مفقود',r.data.access_token?'ok':'err'));
    rows.push(row('refresh_token',r.data.refresh_token?'✅ موجود':'❌ مفقود',r.data.refresh_token?'ok':'err'));
    rows.push(row('user.role',r.data.user?.role||'—','info'));
    rows.push(row('user.grade',r.data.user?.grade||'—','info'));
  } else { rows.push(row('خطأ',JSON.stringify(r.data),'err')); s='err'; }
  // رفض باسورد غلط
  const r2=await api('auth-login',{method:'POST',body:JSON.stringify({login:C.PHONE,password:'WRONG_XXX'})},true);
  rows.push(row('رفض باسورد غلط',r2.status===401||r2.status===400?'✅ يرفض صح':'⚠️ '+r2.status,r2.status===401||r2.status===400?'ok':'warn'));
  // رفض بيانات ناقصة
  const r3=await api('auth-login',{method:'POST',body:JSON.stringify({})},true);
  rows.push(row('رفض بيانات ناقصة',r3.status===400?'✅ يرفض':'⚠️ '+r3.status,r3.status===400?'ok':'warn'));
  setBody('login',tbl(...rows)); setBadge('login',s,s==='ok'?'✅ شغال':'❌ مكسور');
  RESULTS.push({id:'login',s,name:'auth-login'});
}

async function chkSignup() {
  let rows=[], s='ok';
  // محاولة تسجيل بنفس الرقم (المفروض يرفض)
  const r=await api('auth-signup',{method:'POST',body:JSON.stringify({full_name:'تجربة',phone_student:C.PHONE,grade:'3sec',password:'test123456'})},true);
  rows.push(row('HTTP',r.status,'info')); rows.push(row('Latency',r.ms+'ms','info'));
  const dupOk=r.status===400&&(r.data?.error?.includes('مسجل')||r.data?.error?.includes('exist')||r.data?.error?.includes('موجود'));
  rows.push(row('رفض التكرار',dupOk?'✅ يرفض صح':r.status===400?`⚠️ ${r.data?.error}`:`❓ ${r.status}`,dupOk?'ok':r.status===400?'warn':'err'));
  if(r.data?.error?.includes?.('.catch is not a function')){ rows.push(row('BUG .catch','❌ في مشكلة .catch','err')); s='err'; }
  // بيانات ناقصة
  const r2=await api('auth-signup',{method:'POST',body:JSON.stringify({})},true);
  rows.push(row('Validation ناقص',r2.status===400?'✅ يرفض':'⚠️ '+r2.status,r2.status===400?'ok':'warn'));
  setBody('signup',tbl(...rows)); setBadge('signup',s,s==='ok'?'✅ شغال':s==='warn'?'⚠️ تحقق':'❌ مكسور');
  RESULTS.push({id:'signup',s,name:'auth-signup'});
}

async function chkStats() {
  let rows=[], s='ok';
  const r=await api('admin-stats');
  rows.push(row('HTTP',r.status,r.status===200?'ok':'err')); rows.push(row('Latency',r.ms+'ms','info'));
  if(r.data?.ok){
    const c=r.data.counts||{};
    rows.push(row('Users',c.users??'—','info'));
    rows.push(row('Courses',c.courses??'—','info'));
    rows.push(row('Payments (Pending)',c.pending??'—',c.pending>0?'warn':'info'));
    rows.push(row('Payments (Total)',c.total_payments??'—','info'));
    rows.push(row('Revenue',c.total_revenue!=null?`${c.total_revenue} جنيه`:'—','info'));
    rows.push(row('Function','✅ شغالة','ok'));
  } else { rows.push(row('خطأ',JSON.stringify(r.data),'err')); s='err'; }
  setBody('stats',tbl(...rows)); setBadge('stats',s,s==='ok'?'✅ شغال':'❌ مكسور');
  RESULTS.push({id:'stats',s,name:'admin-stats'});
}

async function chkCourses() {
  let rows=[], s='ok';
  const r=await api('admin-courses');
  rows.push(row('HTTP',r.status,r.status===200?'ok':'err'));
  if(r.data?.ok){
    const cs=r.data.courses||[];
    rows.push(row('كورسات',cs.length,'info'));
    cs.slice(0,5).forEach(c=>rows.push(row(`#${c.id}`,`${c.title} <span class="tag">${c.grade}</span>`,'info')));
    if(cs.length>5) rows.push(row('...','و '+(cs.length-5)+' كورس تاني','info'));
    rows.push(row('Function','✅ شغالة','ok'));
  } else { rows.push(row('خطأ',JSON.stringify(r.data),'err')); s='err'; }
  setBody('courses',tbl(...rows)); setBadge('courses',s,s==='ok'?'✅ شغال':'❌ مكسور');
  RESULTS.push({id:'courses',s,name:'admin-courses'});
}

async function chkSchedules() {
  let rows=[], s='ok';
  const r=await api('admin-schedules');
  rows.push(row('HTTP',r.status,r.status===200?'ok':'err'));
  if(r.data?.ok){

async function chkR2() {
  let rows=[], s='ok';
  const r=await api('r2-multipart',{method:'POST',body:JSON.stringify({action:'init',course_id:1,filename:'debug_test.mp4',content_type:'video/mp4'})});
  rows.push(row('Init HTTP',r.status,r.status===200?'ok':'err'));
  rows.push(row('Init Latency',r.ms+'ms','info'));
  if(r.data?.ok&&r.data.upload_id) {
    rows.push(row('Upload ID','✅ رجع upload_id','ok'));
    const {upload_id,key}=r.data;
    const chunk=new Uint8Array(1024).fill(65);
    const token=gT(); const valid=token&&token!=='null'&&token.length>20;
    const url=`${C.FN}/r2-multipart?upload_id=${encodeURIComponent(upload_id)}&key=${encodeURIComponent(key)}&part_number=1`;
    const t0=Date.now();
    try {
      const cr=await fetch(url,{method:'PUT',headers:{'Content-Type':'video/mp4','apikey':C.ANON,'Authorization':`Bearer ${valid?token:C.ANON}`},body:chunk});
      const ms=Date.now()-t0;
      const cd=await cr.json().catch(()=>({}));
      rows.push(row('Chunk PUT HTTP',cr.status,cr.ok?'ok':'err'));
      rows.push(row('Chunk Latency',ms+'ms','info'));
      if(cr.ok&&cd.ok){ rows.push(row('رفع الجزء','✅ نجح','ok')); rows.push(row('ETag',cd.etag,'info')); }
      else { rows.push(row('رفع الجزء',`❌ ${cd.error||cr.status}`,'err')); rows.push(row('الرد',JSON.stringify(cd).substring(0,80),'err')); s='err'; }
    } catch(e){ rows.push(row('رفع الجزء',`❌ ${e.message}`,'err')); s='err'; }
    // إلغاء الاختبار دايماً
    await api('r2-multipart',{method:'POST',body:JSON.stringify({action:'abort',upload_id,key})}).catch(()=>{});
    rows.push(row('Abort','✅ تم إلغاء الاختبار','ok'));
  } else {
    rows.push(row('Init','❌ فشل: '+(r.data?.error||JSON.stringify(r.data)).substring(0,80),'err')); s='err';
  }
  setBody('r2',tbl(...rows)); setBadge('r2',s,s==='ok'?'✅ شغال':'❌ مكسور');
  RESULTS.push({id:'r2',s,name:'R2 Upload'});
}

// ✅ NEW: فحص PWA و manifest.json
async function chkPWA() {
  let rows=[], s='ok';
  try {
    const r=await fetch(`${C.SITE}/manifest.json`,{cache:'no-store'});
    rows.push(row('manifest.json HTTP',r.status,r.ok?'ok':'err'));
    if(r.ok){
      const mf=await r.json().catch(()=>null);
      if(mf){
        rows.push(row('name',mf.name||'❌ مفقود',mf.name?'ok':'err'));
        rows.push(row('start_url',mf.start_url||'❌ مفقود',mf.start_url?'ok':'err'));
        rows.push(row('start_url صح؟',mf.start_url==='/login.html'?'✅ /login.html':mf.start_url==='./login.html'?'✅ ./login.html':mf.start_url==='login.html'?'✅ login.html':`⚠️ ${mf.start_url} — المفروض يكون /login.html`,mf.start_url?.includes('login')?'ok':'warn'));
        rows.push(row('icons',mf.icons?.length?`✅ ${mf.icons.length} icons`:'❌ مفيش icons',mf.icons?.length?'ok':'err'));
        rows.push(row('display',mf.display||'—',mf.display==='standalone'?'ok':'warn'));
        rows.push(row('theme_color',mf.theme_color||'—','info'));
        // فحص الأيقونات بالفعل
        if(mf.icons?.length){
          for(const icon of mf.icons){
            const ir=await fetch(`${C.SITE}/${icon.src.replace(/^\//,'')}`).catch(()=>null);
            rows.push(row(`icon ${icon.sizes}`,ir&&ir.ok?`✅ موجودة`:'❌ مفقودة',ir&&ir.ok?'ok':'err'));
            if(!ir||!ir.ok) s='err';
          }
        }
      } else { rows.push(row('parse','❌ JSON تالف','err')); s='err'; }
    } else { rows.push(row('manifest','❌ مش موجود على السيرفر','err')); s='err'; }
    // فحص service worker
    rows.push(row('Service Worker','ℹ️ مش موجود (اختياري)','info'));
  }catch(e){ rows.push(row('خطأ',e.message,'err')); s='err'; }
  setBody('pwa',tbl(...rows)); setBadge('pwa',s,s==='ok'?'✅ جاهز':s==='err'?'❌ في مشاكل':'⚠️ تحقق');
  RESULTS.push({id:'pwa',s,name:'PWA/Manifest'});
}

// ✅ FIX: تم تغيير الـ URL من GitHub Pages لـ Vercel
async function chkPages() {
  let rows=[], s='ok';
  const base=C.SITE;
  for(const f of C.PAGES) {
    try{
      const r=await fetch(`${base}/${f}`,{method:'HEAD',cache:'no-store'});
      const kb=Math.round(parseInt(r.headers.get('content-length')||'0')/1024);
      // manifest.json صغير طبيعي
      const isJson=f.endsWith('.json');
      if(r.ok&&(kb>2||isJson)){ rows.push(row(f,`✅ ${kb>0?kb+'KB':'موجود'}`,'ok')); }
      else if(r.ok){ rows.push(row(f,`⚠️ ${kb}KB — صغير جداً`,'warn')); if(s==='ok')s='warn'; }
      else { rows.push(row(f,`❌ ${r.status}`,'err')); s='err'; }
    }catch(e){ rows.push(row(f,`❌ ${e.message}`,'err')); s='err'; }
  }
  setBody('pages',tbl(...rows)); setBadge('pages',s,s==='ok'?'✅ كلها موجودة':s==='warn'?'⚠️ تحقق':'❌ في ناقص');

async function chkPerf() {
  let rows=[], s='ok', total=0;
  const eps=[
    ['admin-stats','GET'],
    ['admin-courses','GET'],
    ['admin-payments','GET'],
    ['student-courses?user_id=test','GET'],
    ['coupons','GET'],
  ];
  for(const [ep] of eps){
    const r=await api(ep); total+=r.ms;
    const ps=r.ms<500?'ok':r.ms<1500?'warn':'err';
    if(ps==='err') s='warn';
    rows.push(row(ep.split('?')[0],`${r.ms}ms`,ps));
  }
  const avg=Math.round(total/eps.length);
  rows.push(row('المتوسط',`${avg}ms`,avg<800?'ok':avg<2000?'warn':'err'));
  rows.push(row('التقييم',avg<500?'🚀 ممتاز':avg<1000?'✅ كويس':avg<2000?'⚠️ مقبول':'❌ بطيء جداً',avg<1000?'ok':avg<2000?'warn':'err'));
  setBody('perf',tbl(...rows)); setBadge('perf',s,s==='ok'?`✅ ${avg}ms`:'⚠️ بطيء');
  RESULTS.push({id:'perf',s,name:'الأداء'});
}

// ─── SUMMARY ──────────────────────────────────────────
function showSummary() {
  const ok=RESULTS.filter(r=>r.s==='ok').length;
  const err=RESULTS.filter(r=>r.s==='err').length;
  const warn=RESULTS.filter(r=>r.s==='warn').length;
  const total=RESULTS.length;
  const pct=Math.round(ok/total*100);
  const color=err===0?'#22d3ee':err<=3?'#fbbf24':'#f87171';
  const icon=err===0?'🎉':err<=3?'⚠️':'❌';
  const fails=RESULTS.filter(r=>r.s==='err').map(r=>`<span style="display:inline-block;margin:2px;padding:2px 8px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:4px;font-size:11px;color:#f87171">${r.name}</span>`).join('');
  const warns=RESULTS.filter(r=>r.s==='warn').map(r=>`<span style="display:inline-block;margin:2px;padding:2px 8px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:4px;font-size:11px;color:#fbbf24">${r.name}</span>`).join('');
  const el=document.getElementById('summary');
  el.style.display='block'; el.style.borderColor=color;
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:26px">${icon}</div>
      <div>
        <div style="font-size:15px;font-weight:800;color:${color}">${pct}% — ${ok}/${total} اختبار نجح</div>
        <div style="font-size:12px;color:#64748b;margin-top:2px">
          <span style="color:#22d3ee">✅ ${ok}</span> &nbsp;
          <span style="color:#f87171">❌ ${err}</span> &nbsp;
          <span style="color:#fbbf24">⚠️ ${warn}</span>
        </div>
      </div>
    </div>
    ${fails?`<div style="margin-top:10px">${fails}</div>`:''}
    ${warns?`<div style="margin-top:6px">${warns}</div>`:''}
    <div style="margin-top:8px;font-size:12px;color:#475569">
      ${err===0&&warn===0?'🎉 كل حاجة تمام 100% — المشروع شغال على ما يرام!':
        err===0?`⚠️ ${warn} تحذير بسيط`:
        `🔧 ${err} مشكلة — الكروت الفاشلة مفتوحة تلقائياً`}
    </div>`;
}
