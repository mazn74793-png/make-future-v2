<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center — مشاهدة الكورس</title>
<link rel="manifest" href="manifest.json">
<style>
/* ═══════════════════════════════════════
   Make Future Center V2 — Global Styles
   ═══════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap');

/* ─── CSS Variables ─────────────────── */
:root {
  --primary: #7c3aed;
  --primary-light: #9d5ff5;
  --primary-dark: #5b21b6;
  --secondary: #06b6d4;
  --secondary-light: #22d3ee;
  --accent: #f59e0b;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;

  --grad: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
  --grad-soft: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(6,182,212,0.15) 100%);

  /* Dark Theme (default) */
  --bg: #0a0f1e;
  --bg2: #0f172a;
  --bg3: #1e293b;
  --bg4: #263147;
  --surface: rgba(30,41,59,0.8);
  --surface2: rgba(38,49,71,0.9);
  --border: rgba(124,58,237,0.2);
  --border2: rgba(255,255,255,0.06);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --glow: 0 0 40px rgba(124,58,237,0.3);
}

[data-theme="light"] {
  --bg: #f8fafc;
  --bg2: #f1f5f9;
  --bg3: #e2e8f0;
  --bg4: #cbd5e1;
  --surface: rgba(255,255,255,0.9);
  --surface2: rgba(248,250,252,0.95);
  --border: rgba(124,58,237,0.2);
  --border2: rgba(0,0,0,0.06);
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
  --glow: 0 0 40px rgba(124,58,237,0.15);
}

/* ─── Reset & Base ──────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ─── Scrollbar ─────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* ─── Typography ────────────────────── */
h1,h2,h3,h4,h5,h6 { font-weight: 700; line-height: 1.3; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; }

/* ─── Background Mesh ───────────────── */
.bg-mesh {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%),
    var(--bg);
}

/* ─── Glass Card ────────────────────── */
.glass {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
}
.glass-sm {
  background: var(--surface2);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border2);
  border-radius: 12px;
}

/* ─── Buttons ───────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 24px; border-radius: 12px; font-family: 'Cairo', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
  user-select: none; position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.btn:hover::after { background: rgba(255,255,255,0.08); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

.btn-primary { background: var(--grad); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.btn-primary:hover { box-shadow: 0 8px 30px rgba(124,58,237,0.5); transform: translateY(-1px); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--bg4); }
.btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.btn-success:hover { background: rgba(16,185,129,0.25); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.btn-lg { padding: 14px 32px; font-size: 16px; border-radius: 14px; }
.btn-block { width: 100%; }
.btn-icon { padding: 8px; border-radius: 8px; aspect-ratio: 1; }

/* ─── Form Inputs ───────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 16px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 12px;
  color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px;
  transition: all 0.2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  background: var(--bg2);
}
.form-input::placeholder { color: var(--text3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }

/* ─── Badges ────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-primary { background: rgba(124,58,237,0.2); color: var(--primary-light); }
.badge-success { background: rgba(16,185,129,0.15); color: #10b981; }
.badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-info { background: rgba(6,182,212,0.15); color: #06b6d4; }

/* ─── Stat Cards ────────────────────── */
.stat-card {
  padding: 24px; border-radius: 20px; position: relative; overflow: hidden;
  background: var(--surface); border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s;
}
.stat-card:hover { transform: translateY(-4px); box-shadow: var(--glow); }
.stat-card .stat-icon { font-size: 32px; margin-bottom: 12px; }
.stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-card .stat-label { font-size: 13px; color: var(--text2); margin-top: 6px; }
.stat-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--grad-soft); opacity: 0.5; z-index: 0;
}
.stat-card > * { position: relative; z-index: 1; }

/* ─── Progress Bar ──────────────────── */
.progress-wrap { background: var(--bg3); border-radius: 999px; overflow: hidden; height: 6px; }
.progress-bar { height: 100%; background: var(--grad); border-radius: 999px; transition: width 0.6s ease; }

/* ─── Progress Ring ─────────────────── */
.progress-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring .ring-text { position: absolute; font-size: 13px; font-weight: 800; color: var(--text); }

/* ─── Tabs ──────────────────────────── */
.tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: 14px; padding: 4px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 16px; border-radius: 10px; font-family: 'Cairo', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; border: none;
  background: transparent; color: var(--text2); transition: all 0.2s; white-space: nowrap;
}
.tab-btn.active { background: var(--grad); color: #fff; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
.tab-pane { display: none; }
.tab-pane.active { display: block; animation: fadeIn 0.3s ease; }

/* ─── Table ─────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border2); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 14px 16px; background: var(--bg3); color: var(--text2); font-weight: 600; text-align: right; white-space: nowrap; }
td { padding: 12px 16px; border-top: 1px solid var(--border2); color: var(--text); }
tr:hover td { background: rgba(124,58,237,0.04); }

/* ─── Modal ─────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 24px;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  transform: scale(0.9) translateY(20px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal-box { transform: scale(1) translateY(0); }
.modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 20px 24px 24px; }
.modal-title { font-size: 18px; font-weight: 700; }

/* ─── Navbar ────────────────────────── */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,15,30,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; height: 64px;
  transition: background 0.3s;
}
[data-theme="light"] .navbar { background: rgba(248,250,252,0.9); }
.nav-logo { font-size: 18px; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-actions { display: flex; align-items: center; gap: 8px; }

/* ─── Notification Badge ────────────── */
.notif-dot {
  position: absolute; top: -2px; right: -2px; width: 8px; height: 8px;
  background: var(--danger); border-radius: 50%; border: 2px solid var(--bg);
  animation: pulse 2s infinite;
}

/* ─── Animations ────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } }
@keyframes shimmer { to { background-position: 200% center; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.fade-up { animation: fadeUp 0.5s ease both; }
.fade-up-1 { animation-delay: 0.1s; }
.fade-up-2 { animation-delay: 0.2s; }
.fade-up-3 { animation-delay: 0.3s; }
.fade-up-4 { animation-delay: 0.4s; }

/* ─── Skeleton Loading ──────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% auto;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

/* ─── Grid ──────────────────────────── */
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
@media (max-width: 900px) { .grid-4,.grid-3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px) { .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr; } }

/* ─── Utility ───────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.w-full { width: 100%; }
.text-center { text-align: center; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--text2); }
.text-primary { color: var(--primary-light); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warn { color: var(--warn); }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.p-3 { padding: 12px; } .p-4 { padding: 16px; } .p-5 { padding: 20px; } .p-6 { padding: 24px; }
.rounded { border-radius: 8px; } .rounded-lg { border-radius: 14px; } .rounded-xl { border-radius: 20px; }
.hidden { display: none !important; }
.pointer { cursor: pointer; }

/* ─── Theme Toggle ──────────────────── */
.theme-toggle {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border2);
  background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.2s;
}
.theme-toggle:hover { background: var(--bg4); transform: scale(1.05); }

/* ─── Empty State ───────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ─── Container ─────────────────────── */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.page-content { padding: 24px 0; }

/* ─── Section Header ────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 18px; font-weight: 700; }

/* ─── Divider ───────────────────────── */
.divider { height: 1px; background: var(--border2); margin: 16px 0; }

/* ─── Scrollable List ───────────────── */
.scroll-list { max-height: 400px; overflow-y: auto; }

/* ─── PWA Install Banner ────────────── */
#pwa-banner {
  position: fixed; bottom: 80px; left: 16px; right: 16px;
  background: var(--grad); color: #fff; border-radius: 16px; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 8px 32px rgba(124,58,237,0.4); z-index: 500; animation: slideDown 0.5s ease;
}

</style>
<style>
body { background: #0a0f1e; }
.course-layout { display: grid; grid-template-columns: 1fr 320px; gap: 0; min-height: calc(100vh - 64px); }
@media(max-width:900px){ .course-layout { grid-template-columns:1fr; } .sidebar { order: -1; } }

/* Video Player */
.video-container { position: relative; background: #000; border-radius: 0; overflow: hidden; }
.video-container iframe, .video-container video { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

/* Watermark */
#watermark {
  position: absolute; pointer-events: none; z-index: 50;
  color: rgba(255,80,80,0.18); font-size: 13px; font-weight: 800;
  font-family: 'Cairo',sans-serif; white-space: nowrap;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  user-select: none; transition: top 0.5s ease, left 0.5s ease;
}

/* Sidebar */
.sidebar { background: var(--bg2); border-right: 1px solid var(--border2); overflow-y: auto; max-height: calc(100vh - 64px); position: sticky; top: 64px; }
@media(max-width:900px){ .sidebar { max-height: 300px; position: relative; top: auto; } }
.video-list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid var(--border2); }
.video-list-item:hover { background: rgba(124,58,237,0.08); }
.video-list-item.active { background: rgba(124,58,237,0.15); border-right: 3px solid var(--primary); }
.video-list-item .vi-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.video-list-item.completed .vi-num { background: rgba(16,185,129,0.2); color: #10b981; }
.video-list-item.active .vi-num { background: var(--grad); color: #fff; }
.vi-title { font-size: 13px; font-weight: 600; }
.vi-duration { font-size: 11px; color: var(--text2); }

/* Main Content Area */
.main-area { overflow-y: auto; }
.video-info { padding: 20px; border-bottom: 1px solid var(--border2); }
.video-info h2 { font-size: 18px; font-weight: 700; }

/* Tabs under video */
.video-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border2); background: var(--bg2); }
.video-tab { padding: 12px 20px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; color:var(--text2); cursor:pointer; border:none; background:none; border-bottom:3px solid transparent; transition:all 0.2s; }
.video-tab.active { color:var(--primary-light); border-bottom-color:var(--primary); }

/* Comments */
.comment-item { padding: 14px; border-radius: 14px; background: var(--bg3); margin-bottom: 12px; }
.comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.comment-name { font-size: 13px; font-weight: 700; }
.comment-time { font-size: 11px; color: var(--text2); }
.comment-text { font-size: 13px; }
.comment-reply { margin-top: 10px; padding: 10px; border-radius: 10px; background: rgba(124,58,237,0.1); border-right: 3px solid var(--primary); font-size: 12px; }
.comment-reply strong { color: var(--primary-light); font-size: 11px; }
.pin-badge { font-size: 10px; background: rgba(245,158,11,0.2); color: #f59e0b; padding: 2px 6px; border-radius: 4px; }

/* Quiz */
.quiz-card { padding: 24px; border-radius: 20px; background: var(--grad-soft); border: 1px solid var(--border); margin: 20px; }
.quiz-question { padding: 20px; border-radius: 16px; background: var(--surface); margin-bottom: 16px; }
.quiz-question h4 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.quiz-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg3); cursor: pointer; transition: all 0.2s; margin-bottom: 8px; font-size: 13px; }
.quiz-option:hover { border-color: var(--primary); background: rgba(124,58,237,0.08); }
.quiz-option.selected { border-color: var(--primary); background: rgba(124,58,237,0.15); }
.quiz-option.correct { border-color: #10b981; background: rgba(16,185,129,0.15); }
.quiz-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); }
.quiz-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border2); flex-shrink: 0; transition: all 0.2s; }
.quiz-option.selected .quiz-radio { background: var(--primary); border-color: var(--primary); }

/* Progress Ring */
.ring-container { position: relative; display: inline-flex; }
.ring-container svg { transform: rotate(-90deg); }
.ring-container .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; }
</style>
</head>
<body>
<div class="bg-mesh"></div>

<nav class="navbar">
  <button class="btn btn-sm btn-secondary" onclick="history.back()">← رجوع</button>
  <span class="nav-logo" id="navTitle">📹 الكورس</span>
  <div class="flex items-center gap-2">
    <div class="ring-container" title="تقدمك في الكورس">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="16" fill="none" stroke="var(--bg3)" stroke-width="3"/>
        <circle cx="20" cy="20" r="16" fill="none" stroke="url(#rg)" stroke-width="3" stroke-linecap="round" id="progressRing" stroke-dasharray="100.5" stroke-dashoffset="100.5"/>
        <defs><linearGradient id="rg"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      </svg>
      <div class="ring-pct" id="progressPct" style="font-size:9px;font-weight:900">0%</div>
    </div>
    <button class="theme-toggle" onclick="onToggleTheme()" id="themeBtn">🌙</button>
  </div>
</nav>

<div class="course-layout">

  <!-- Sidebar: Video List -->

// ─── API Helper ───────────────────────
async function mfFetch(endpoint, options = {}) {
  const token = localStorage.getItem('mf_access_token');
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(`${MF_CONFIG.FN}/${endpoint}`, { ...options, headers });
    const data = await res.json();
    return data;
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// ─── Auth Helpers ─────────────────────
function getUser() {
  try { return JSON.parse(localStorage.getItem('mf_user') || 'null'); } catch { return null; }
}
function getToken() { return localStorage.getItem('mf_access_token'); }
function logout() {
  ['mf_user','mf_access_token','mf_refresh_token','mf_selected_course'].forEach(k => localStorage.removeItem(k));
  window.location.href = 'login.html';
}
function requireAuth(allowedRoles = []) {
  const user = getUser();
  if (!user) { window.location.href = 'login.html'; return null; }
  if (allowedRoles.length && !allowedRoles.includes(user.role)) {
    if (user.role === 'student') window.location.href = 'student.html';
    else window.location.href = 'admin.html';
    return null;
  }
  return user;
}
function isAdmin(user) { return ['admin','superadmin','course_admin'].includes(user?.role); }
function isSuperAdmin(user) { return user?.role === 'superadmin'; }

// ─── Toast Notifications ──────────────
function toast(msg, type = 'info', duration = 3500) {
  const colors = { success: '#10b981', error: '#ef4444', info: '#7c3aed', warn: '#f59e0b' };
  const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:${colors[type]};color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-family:Cairo,sans-serif;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:90vw;text-align:center;direction:rtl;`;
  el.textContent = icons[type] + ' ' + msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(100px)'; setTimeout(() => el.remove(), 300); }, duration);
}

// ─── Loading Overlay ──────────────────
function showLoading(show = true) {
  let ov = document.getElementById('mf-loading');
  if (show && !ov) {
    ov = document.createElement('div');
    ov.id = 'mf-loading';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.7);backdrop-filter:blur(4px);z-index:9998;display:flex;align-items:center;justify-content:center;';
    ov.innerHTML = '<div style="width:48px;height:48px;border:3px solid rgba(124,58,237,0.3);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite;"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    document.body.appendChild(ov);
  } else if (!show && ov) ov.remove();
}

// ─── Dark Mode ────────────────────────
function initTheme() {
  const saved = localStorage.getItem('mf_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  return saved;
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mf_theme', next);
  return next;
}

// ─── Grade Labels ─────────────────────
const GRADE_LABELS = { '3prep':'الثالث الإعدادي','1sec':'الأول الثانوي','2sec':'الثاني الثانوي','3sec':'الثالث الثانوي' };
const GRADE_OPTIONS = Object.entries(GRADE_LABELS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
function gradeLabel(g) { return GRADE_LABELS[g] || g; }

// ─── Date Formatting ──────────────────
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('ar-EG', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ─── Number Format ────────────────────
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG'); }

// ─── Debounce ─────────────────────────
function debounce(fn, ms = 300) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

<script>
initTheme();
updateThemeBtn();
const user = requireAuth(['student','admin','superadmin','course_admin']);
if(!user) throw new Error('no user');

function updateThemeBtn(){ document.getElementById('themeBtn').textContent = document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'; }
function onToggleTheme(){ toggleTheme(); updateThemeBtn(); }

const course = JSON.parse(localStorage.getItem('mf_selected_course')||'null');
if(!course){ toast('لم يتم اختيار كورس','error'); setTimeout(()=>history.back(),1500); }

document.getElementById('navTitle').textContent = '📹 ' + (course?.title||'');
document.getElementById('courseSubject').textContent = course?.subject||'';

let videos = [], progress = {}, currentVideo = null, currentQuiz = null;
let progressTimer = null, watchedSec = 0, totalSec = 0;
let answers = {};
let wmInterval = null;

// ─── Watermark ────────────────────────
function startWatermark(){
  const wm = document.getElementById('watermark');
  wm.textContent = (user.phone_student||user.phone||'') + ' — Make Future';
  function move(){
    const container = document.getElementById('videoContainer');
    if(!container) return;
    const maxX = container.offsetWidth - wm.offsetWidth - 20;
    const maxY = container.offsetHeight - wm.offsetHeight - 20;
    const x = Math.max(10, Math.random()*maxX);
    const y = Math.max(10, Math.random()*maxY);
    wm.style.left = x+'px';
    wm.style.top = y+'px';
  }
  move();
  if(wmInterval) clearInterval(wmInterval);
  wmInterval = setInterval(move, 5000);
}

// ─── Load Data ────────────────────────
async function loadCourse(){
  const [vidRes, progRes, schedRes] = await Promise.all([
    mfFetch(`course-videos?course_id=${course.id}`),
    mfFetch(`video-progress?user_id=${user.id}&course_id=${course.id}`),
    mfFetch(`admin-schedules?course_id=${course.id}`)
  ]);
  videos = vidRes.videos || [];
  (progRes.progress||[]).forEach(p=>{ progress[p.video_id]=p; });
  updateCourseProgress(progRes);
  renderVideoList(videos);
  renderSchedule(schedRes.schedules||[]);
  if(videos.length) playVideo(videos[0]);
}

function updateCourseProgress(progRes){
  const pct = progRes?.percent || 0;
  document.getElementById('progressPct').textContent = pct+'%';
  const circ = Math.PI*2*16;
  const offset = circ*(1-pct/100);
  document.getElementById('progressRing').style.strokeDashoffset = offset;
  document.getElementById('progressRing').style.strokeDasharray = circ;
}

function renderVideoList(vids){
  const list = document.getElementById('videoList');
  if(!vids.length){ list.innerHTML='<div class="empty-state"><p>لا توجد فيديوهات</p></div>'; return; }
  list.innerHTML = vids.map((v,i)=>{
    const p = progress[v.id];
    const completed = p?.completed;
    const pct = p?.watched_pct||0;
    return `<div class="video-list-item ${completed?'completed':''}" id="vitem-${v.id}" onclick="playVideo(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="vi-num">${completed?'✅':(i+1)}</div>
      <div style="flex:1;min-width:0">
        <div class="vi-title truncate">${v.title}</div>
        <div class="vi-duration">${completed?'مكتمل':pct?pct+'%':v.video_type==='upload'?'🎬 مرفوع':'📺 يوتيوب'}</div>
        ${pct&&!completed?`<div class="progress-wrap mt-1" style="height:2px"><div class="progress-bar" style="width:${pct}%"></div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ─── Play Video ───────────────────────
async function playVideo(video){
  if(typeof video === 'string') video = JSON.parse(video);
  currentVideo = video;

  // Update active state
  document.querySelectorAll('.video-list-item').forEach(el=>el.classList.remove('active'));
  const item = document.getElementById('vitem-'+video.id);
  if(item){ item.classList.add('active'); item.scrollIntoView({block:'nearest',behavior:'smooth'}); }

  document.getElementById('currentVideoTitle').textContent = video.title;
  document.getElementById('currentVideoDesc').textContent = video.description||'';

  // Restore progress
  const prev = progress[video.id];
  const resumeAt = prev?.watched_sec||0;
  totalSec = video.duration_sec||0;
  watchedSec = resumeAt;

  // Update progress bar
  updateVideoProgressBar(prev?.watched_pct||0);

  // Load player
  const container = document.getElementById('videoContainer');
  clearProgressTimer();

  if(video.video_type==='youtube' && video.youtube_url){
    const ytId = extractYTId(video.youtube_url);
    const startParam = resumeAt>10?`&start=${resumeAt}`:'';
    container.querySelector(':not(#watermark)') && container.innerHTML = `<div id="watermark"></div>`;
    container.innerHTML = `<iframe id="ytFrame" src="https://www.youtube.com/embed/${ytId}?enablejsapi=1&rel=0&modestbranding=1${startParam}" allowfullscreen allow="autoplay"></iframe><div id="watermark"></div>`;
    startWatermark();
    // Track YouTube via interval (approximate)
    startYTProgressTracking(resumeAt, totalSec, video);
  } else if(video.video_type==='upload' && video.r2_key){
    // Get presigned URL
    const urlRes = await mfFetch(`get-video-url?video_id=${video.id}&user_id=${user.id}`);
    if(!urlRes.ok){ toast('فشل تحميل الفيديو: '+urlRes.error,'error'); return; }
    container.innerHTML = `<video id="nativeVideo" src="${urlRes.url}" controls controlsList="nodownload" oncontextmenu="return false" style="width:100%;aspect-ratio:16/9"></video><div id="watermark"></div>`;
    startWatermark();
    const vid = document.getElementById('nativeVideo');
    if(resumeAt>5) vid.currentTime = resumeAt;
    vid.addEventListener('timeupdate', ()=>{ watchedSec=Math.floor(vid.currentTime); totalSec=Math.floor(vid.duration)||totalSec; updateVideoProgressBar(totalSec?Math.min(100,Math.round(watchedSec/totalSec*100)):0); });
    vid.addEventListener('pause', ()=>saveProgress(video));
    startProgressTimer(video);
  }

  // Load comments & quiz
  loadComments(video.id);
  loadQuiz(video.id);
}

function extractYTId(url){
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([^&\n?#]+)/);
  return m?m[1]:'';
}

// ─── Progress Tracking ────────────────
function startProgressTimer(video){
  clearProgressTimer();
  progressTimer = setInterval(()=>saveProgress(video), 5000);
}
function clearProgressTimer(){ if(progressTimer){ clearInterval(progressTimer); progressTimer=null; } }

// YouTube: estimate progress by time
function startYTProgressTracking(startSec, dur, video){
  let elapsed = startSec;
  clearProgressTimer();
  const t = Date.now();
  progressTimer = setInterval(()=>{
    elapsed = startSec + Math.floor((Date.now()-t)/1000);
    watchedSec = elapsed;
    if(dur>0){ const pct=Math.min(100,Math.round(elapsed/dur*100)); updateVideoProgressBar(pct); }
    if(elapsed>0 && elapsed%10===0) saveProgress(video);
  },1000);
}

function updateVideoProgressBar(pct){
  document.getElementById('videoProgressBar').style.width = pct+'%';
  document.getElementById('videoProgressPct').textContent = pct+'%';
}

async function saveProgress(video){
  if(!currentVideo||watchedSec<2) return;
  const res = await mfFetch('video-progress',{method:'POST',body:JSON.stringify({user_id:user.id,video_id:video.id,course_id:course.id,watched_sec:watchedSec,duration_sec:totalSec||1})});
  if(res.ok){
    progress[video.id] = res.progress;
    // Update sidebar checkmark
    renderVideoList(videos);
    // Reload course progress
    const pr = await mfFetch(`video-progress?user_id=${user.id}&course_id=${course.id}`);
    updateCourseProgress(pr);
  }
}

// Save on page leave
window.addEventListener('beforeunload',()=>{ if(currentVideo) saveProgress(currentVideo); });

// ─── Comments ─────────────────────────
async function loadComments(videoId){
  const res = await mfFetch(`video-comments?video_id=${videoId}`);
  const comments = res.comments||[];
  const list = document.getElementById('commentsList');
  if(!comments.length){ list.innerHTML='<div class="empty-state"><div class="empty-icon">💬</div><p>لا توجد تعليقات بعد، كن الأول!</p></div>'; return; }
  list.innerHTML = comments.map(c=>`
    <div class="comment-item ${c.is_pinned?'':''}">
      <div class="comment-header">
        <div class="comment-avatar">${(c.user_name||'؟').charAt(0)}</div>
        <div><div class="comment-name">${c.user_name||'مجهول'} ${c.is_pinned?'<span class="pin-badge">📌 مثبت</span>':''}</div><div class="comment-time">${fmtDateTime(c.created_at)}</div></div>
      </div>
      <div class="comment-text">${c.message}</div>
      ${c.reply?`<div class="comment-reply"><strong>👨‍🏫 رد الأستاذ:</strong><br>${c.reply}</div>`:''}
    </div>`).join('');
}

async function submitComment(){
  const msg = document.getElementById('commentInput').value.trim();
  if(!msg){ toast('اكتب تعليقاً أولاً','warn'); return; }
  if(!currentVideo){ toast('اختر فيديو أولاً','warn'); return; }
  const res = await mfFetch('video-comments',{method:'POST',body:JSON.stringify({user_id:user.id,video_id:currentVideo.id,course_id:course.id,message:msg})});
  if(!res.ok){ toast(res.error||'فشل الإرسال','error'); return; }
  document.getElementById('commentInput').value='';
  toast('تم إرسال تعليقك ✅','success');
  loadComments(currentVideo.id);
}

// ─── Quiz ─────────────────────────────
async function loadQuiz(videoId){
  const res = await mfFetch(`quizzes?course_id=${course.id}`);
  const quizzes = (res.quizzes||[]).filter(q=>q.video_id==videoId||q.video_id===null);
  const area = document.getElementById('quizArea');
  if(!quizzes.length){ area.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>لا يوجد كويز لهذا الفيديو</p></div>'; return; }
  const quiz = quizzes[0];
  currentQuiz = quiz;
  // Check previous attempt
  const attemptRes = await mfFetch(`quiz-attempts?quiz_id=${quiz.id}&user_id=${user.id}`);
  const prev = attemptRes.attempt;
  if(prev){
    area.innerHTML=`<div class="quiz-card"><div class="text-center"><div style="font-size:48px">${prev.passed?'🏆':'😔'}</div><h3 class="mt-3">${prev.passed?'أحسنت! اجتزت الكويز':'لم تجتز الكويز'}</h3><div class="text-muted mt-2">نتيجتك: <strong style="font-size:24px;color:${prev.passed?'var(--success)':'var(--danger)'}">${prev.score}%</strong></div><button class="btn btn-secondary mt-4" onclick="startQuiz(${quiz.id})">إعادة المحاولة</button></div></div>`;
    return;
  }
  startQuiz(quiz.id);
}

async function startQuiz(quizId){
  const res = await mfFetch(`quizzes?quiz_id=${quizId}`);
  const area = document.getElementById('quizArea');
  if(!res.quiz||!res.questions?.length){ area.innerHTML='<div class="empty-state"><p>لا توجد أسئلة في هذا الكويز</p></div>'; return; }
  answers={};
  area.innerHTML=`
    <div class="quiz-card">
      <h3 class="mb-1">${res.quiz.title}</h3>
      <p class="text-sm text-muted mb-4">${res.quiz.description||''} | درجة النجاح: ${res.quiz.pass_score}%</p>
      ${res.questions.map((q,i)=>`
        <div class="quiz-question">
          <h4>${i+1}. ${q.question}</h4>
          ${['a','b','c','d'].map(opt=>`
            <div class="quiz-option" id="qopt-${q.id}-${opt}" onclick="selectAnswer(${q.id},'${opt}',this)">
              <div class="quiz-radio" id="qrad-${q.id}-${opt}"></div>
              <span>${q['option_'+opt]}</span>
            </div>`).join('')}
        </div>`).join('')}
      <button class="btn btn-primary btn-block" onclick="submitQuiz(${quizId},${JSON.stringify(res.questions).replace(/</g,'\\u003c')})">
        📤 تسليم الإجابات
      </button>
    </div>`;
}

function selectAnswer(qId, opt, el){
  // Deselect others for same question
  ['a','b','c','d'].forEach(o=>{
    document.getElementById('qopt-'+qId+'-'+o)?.classList.remove('selected');
  });
  el.classList.add('selected');
  answers[qId] = opt;
}

async function submitQuiz(quizId, questions){
  if(Object.keys(answers).length < questions.length){ toast('أجب على كل الأسئلة أولاً','warn'); return; }
  const res = await mfFetch('quiz-attempts',{method:'POST',body:JSON.stringify({quiz_id:quizId,user_id:user.id,answers})});
  if(!res.ok){ toast(res.error||'فشل التسليم','error'); return; }
  // Show results
  questions.forEach(q=>{
    const correct = q.correct_answer;
    const given = answers[q.id];
    ['a','b','c','d'].forEach(o=>{
      const el = document.getElementById('qopt-'+q.id+'-'+o);
      if(!el) return;
      if(o===correct) el.classList.add('correct');
      else if(o===given && given!==correct) el.classList.add('wrong');
    });
  });
  document.querySelector('.quiz-card button')?.remove();
  const msg = document.createElement('div');
  msg.style='text-align:center;padding:20px;margin-top:16px;border-radius:16px;background:var(--bg2)';
  msg.innerHTML = `<div style="font-size:48px">${res.passed?'🏆':'😔'}</div><h3 style="margin-top:8px">${res.passed?'ممتاز! اجتزت الكويز':'لم تجتز الكويز'}</h3><p style="color:var(--text2);margin-top:8px">نتيجتك: <strong style="font-size:24px;color:${res.passed?'var(--success)':'var(--danger)'}">${res.score}%</strong> (${res.correct_count}/${res.total} صح)</p>`;
  document.querySelector('.quiz-card').appendChild(msg);
  toast(res.passed?`أحسنت! نتيجتك ${res.score}% 🏆`:`نتيجتك ${res.score}% — حاول مرة أخرى`,'success');
}

// ─── Schedule ─────────────────────────
function renderSchedule(schedules){
  const area = document.getElementById('scheduleArea');
  if(!schedules.length){ area.innerHTML='<div class="empty-state"><div class="empty-icon">📅</div><p>لا توجد مواعيد محددة</p></div>'; return; }
  area.innerHTML = schedules.map(s=>`
    <div class="sched-item">
      <div class="sched-day">${s.day_of_week}</div>
      <div><div class="sched-time">⏰ ${s.start_time} → ${s.end_time}</div>${s.notes?`<div class="text-xs text-muted">${s.notes}</div>`:''}</div>
    </div>`).join('');
}

// ─── Sub-tabs ─────────────────────────
function switchVTab(tab, btn){
  document.querySelectorAll('[id^=vtab-]').forEach(el=>el.classList.add('hidden'));
  document.querySelectorAll('.video-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('vtab-'+tab).classList.remove('hidden');
  btn.classList.add('active');
}
