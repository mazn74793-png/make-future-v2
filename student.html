<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center — لوحة الطالب</title>
<link rel="manifest" href="manifest.json">
<style>
/* ═══════════════════════════════════════
   Make Future Center V2 — Global Styles
   ═══════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap');

/* ─── CSS Variables ─────────────────── */
:root {
  --primary: #7c3aed;
  --primary-light: #9d5ff5;
  --primary-dark: #5b21b6;
  --secondary: #06b6d4;
  --secondary-light: #22d3ee;
  --accent: #f59e0b;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;

  --grad: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
  --grad-soft: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(6,182,212,0.15) 100%);

  /* Dark Theme (default) */
  --bg: #0a0f1e;
  --bg2: #0f172a;
  --bg3: #1e293b;
  --bg4: #263147;
  --surface: rgba(30,41,59,0.8);
  --surface2: rgba(38,49,71,0.9);
  --border: rgba(124,58,237,0.2);
  --border2: rgba(255,255,255,0.06);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --glow: 0 0 40px rgba(124,58,237,0.3);
}

[data-theme="light"] {
  --bg: #f8fafc;
  --bg2: #f1f5f9;
  --bg3: #e2e8f0;
  --bg4: #cbd5e1;
  --surface: rgba(255,255,255,0.9);
  --surface2: rgba(248,250,252,0.95);
  --border: rgba(124,58,237,0.2);
  --border2: rgba(0,0,0,0.06);
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
  --glow: 0 0 40px rgba(124,58,237,0.15);
}

/* ─── Reset & Base ──────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ─── Scrollbar ─────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* ─── Typography ────────────────────── */
h1,h2,h3,h4,h5,h6 { font-weight: 700; line-height: 1.3; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; }

/* ─── Background Mesh ───────────────── */
.bg-mesh {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%),
    var(--bg);
}

/* ─── Glass Card ────────────────────── */
.glass {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
}
.glass-sm {
  background: var(--surface2);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border2);
  border-radius: 12px;
}

/* ─── Buttons ───────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 24px; border-radius: 12px; font-family: 'Cairo', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
  user-select: none; position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0);
  transition: background 0.2s;
}
.btn:hover::after { background: rgba(255,255,255,0.08); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

.btn-primary { background: var(--grad); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.btn-primary:hover { box-shadow: 0 8px 30px rgba(124,58,237,0.5); transform: translateY(-1px); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--bg4); }
.btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.btn-success:hover { background: rgba(16,185,129,0.25); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.btn-lg { padding: 14px 32px; font-size: 16px; border-radius: 14px; }
.btn-block { width: 100%; }
.btn-icon { padding: 8px; border-radius: 8px; aspect-ratio: 1; }

/* ─── Form Inputs ───────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 16px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 12px;
  color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px;
  transition: all 0.2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  background: var(--bg2);
}
.form-input::placeholder { color: var(--text3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }

/* ─── Badges ────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-primary { background: rgba(124,58,237,0.2); color: var(--primary-light); }
.badge-success { background: rgba(16,185,129,0.15); color: #10b981; }
.badge-danger { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge-info { background: rgba(6,182,212,0.15); color: #06b6d4; }

/* ─── Stat Cards ────────────────────── */
.stat-card {
  padding: 24px; border-radius: 20px; position: relative; overflow: hidden;
  background: var(--surface); border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s;
}
.stat-card:hover { transform: translateY(-4px); box-shadow: var(--glow); }
.stat-card .stat-icon { font-size: 32px; margin-bottom: 12px; }
.stat-card .stat-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-card .stat-label { font-size: 13px; color: var(--text2); margin-top: 6px; }
.stat-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--grad-soft); opacity: 0.5; z-index: 0;
}
.stat-card > * { position: relative; z-index: 1; }

/* ─── Progress Bar ──────────────────── */
.progress-wrap { background: var(--bg3); border-radius: 999px; overflow: hidden; height: 6px; }
.progress-bar { height: 100%; background: var(--grad); border-radius: 999px; transition: width 0.6s ease; }

/* ─── Progress Ring ─────────────────── */
.progress-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring .ring-text { position: absolute; font-size: 13px; font-weight: 800; color: var(--text); }

/* ─── Tabs ──────────────────────────── */
.tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: 14px; padding: 4px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 16px; border-radius: 10px; font-family: 'Cairo', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; border: none;
  background: transparent; color: var(--text2); transition: all 0.2s; white-space: nowrap;
}
.tab-btn.active { background: var(--grad); color: #fff; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
.tab-pane { display: none; }
.tab-pane.active { display: block; animation: fadeIn 0.3s ease; }

/* ─── Table ─────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border2); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 14px 16px; background: var(--bg3); color: var(--text2); font-weight: 600; text-align: right; white-space: nowrap; }
td { padding: 12px 16px; border-top: 1px solid var(--border2); color: var(--text); }
tr:hover td { background: rgba(124,58,237,0.04); }

/* ─── Modal ─────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 24px;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  transform: scale(0.9) translateY(20px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal-box { transform: scale(1) translateY(0); }
.modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 20px 24px 24px; }
.modal-title { font-size: 18px; font-weight: 700; }

/* ─── Navbar ────────────────────────── */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,15,30,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; height: 64px;
  transition: background 0.3s;
}
[data-theme="light"] .navbar { background: rgba(248,250,252,0.9); }
.nav-logo { font-size: 18px; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-actions { display: flex; align-items: center; gap: 8px; }

/* ─── Notification Badge ────────────── */
.notif-dot {
  position: absolute; top: -2px; right: -2px; width: 8px; height: 8px;
  background: var(--danger); border-radius: 50%; border: 2px solid var(--bg);
  animation: pulse 2s infinite;
}

/* ─── Animations ────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } }
@keyframes shimmer { to { background-position: 200% center; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.fade-up { animation: fadeUp 0.5s ease both; }
.fade-up-1 { animation-delay: 0.1s; }
.fade-up-2 { animation-delay: 0.2s; }
.fade-up-3 { animation-delay: 0.3s; }
.fade-up-4 { animation-delay: 0.4s; }

/* ─── Skeleton Loading ──────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% auto;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

/* ─── Grid ──────────────────────────── */
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
@media (max-width: 900px) { .grid-4,.grid-3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 600px) { .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr; } }

/* ─── Utility ───────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.w-full { width: 100%; }
.text-center { text-align: center; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--text2); }
.text-primary { color: var(--primary-light); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warn { color: var(--warn); }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.p-3 { padding: 12px; } .p-4 { padding: 16px; } .p-5 { padding: 20px; } .p-6 { padding: 24px; }
.rounded { border-radius: 8px; } .rounded-lg { border-radius: 14px; } .rounded-xl { border-radius: 20px; }
.hidden { display: none !important; }
.pointer { cursor: pointer; }

/* ─── Theme Toggle ──────────────────── */
.theme-toggle {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border2);
  background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.2s;
}
.theme-toggle:hover { background: var(--bg4); transform: scale(1.05); }

/* ─── Empty State ───────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ─── Container ─────────────────────── */
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.page-content { padding: 24px 0; }

/* ─── Section Header ────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 18px; font-weight: 700; }

/* ─── Divider ───────────────────────── */
.divider { height: 1px; background: var(--border2); margin: 16px 0; }

/* ─── Scrollable List ───────────────── */
.scroll-list { max-height: 400px; overflow-y: auto; }

/* ─── PWA Install Banner ────────────── */
#pwa-banner {
  position: fixed; bottom: 80px; left: 16px; right: 16px;
  background: var(--grad); color: #fff; border-radius: 16px; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 8px 32px rgba(124,58,237,0.4); z-index: 500; animation: slideDown 0.5s ease;
}

</style>

.filter-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

.filter-chip.active { background: rgba(124,58,237,0.2); border-color: var(--primary); color: var(--primary-light); }
</style>

<!-- Navbar -->

// ═══════════════════════════════════════

// ─── API Helper ───────────────────────
async function mfFetch(endpoint, options = {}) {
  const token = localStorage.getItem('mf_access_token');
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(`${MF_CONFIG.FN}/${endpoint}`, { ...options, headers });
    const data = await res.json();
    return data;
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// ─── Auth Helpers ─────────────────────
function getUser() {
  try { return JSON.parse(localStorage.getItem('mf_user') || 'null'); } catch { return null; }
}
function getToken() { return localStorage.getItem('mf_access_token'); }
function logout() {
  ['mf_user','mf_access_token','mf_refresh_token','mf_selected_course'].forEach(k => localStorage.removeItem(k));
  window.location.href = 'login.html';
}
function requireAuth(allowedRoles = []) {
  const user = getUser();
  if (!user) { window.location.href = 'login.html'; return null; }
  if (allowedRoles.length && !allowedRoles.includes(user.role)) {
    if (user.role === 'student') window.location.href = 'student.html';
    else window.location.href = 'admin.html';
    return null;
  }
  return user;
}
function isAdmin(user) { return ['admin','superadmin','course_admin'].includes(user?.role); }
function isSuperAdmin(user) { return user?.role === 'superadmin'; }

// ─── Toast Notifications ──────────────
function toast(msg, type = 'info', duration = 3500) {
  const colors = { success: '#10b981', error: '#ef4444', info: '#7c3aed', warn: '#f59e0b' };
  const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:${colors[type]};color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-family:Cairo,sans-serif;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);max-width:90vw;text-align:center;direction:rtl;`;
  el.textContent = icons[type] + ' ' + msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(100px)'; setTimeout(() => el.remove(), 300); }, duration);
}

// ─── Loading Overlay ──────────────────
function showLoading(show = true) {
  let ov = document.getElementById('mf-loading');
  if (show && !ov) {
    ov = document.createElement('div');
    ov.id = 'mf-loading';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.7);backdrop-filter:blur(4px);z-index:9998;display:flex;align-items:center;justify-content:center;';
    ov.innerHTML = '<div style="width:48px;height:48px;border:3px solid rgba(124,58,237,0.3);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite;"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    document.body.appendChild(ov);
  } else if (!show && ov) ov.remove();
}

// ─── Dark Mode ────────────────────────
function initTheme() {
  const saved = localStorage.getItem('mf_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  return saved;
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mf_theme', next);
  return next;
}

// ─── Grade Labels ─────────────────────
const GRADE_LABELS = { '3prep':'الثالث الإعدادي','1sec':'الأول الثانوي','2sec':'الثاني الثانوي','3sec':'الثالث الثانوي' };
const GRADE_OPTIONS = Object.entries(GRADE_LABELS).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
function gradeLabel(g) { return GRADE_LABELS[g] || g; }

// ─── Date Formatting ──────────────────
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('ar-EG', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ─── Number Format ────────────────────
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG'); }

// ─── Debounce ─────────────────────────
function debounce(fn, ms = 300) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

</script>
<script>
initTheme();
updateThemeBtn();
const user = requireAuth(['student','admin','superadmin','course_admin']);
if(!user) throw new Error('no user');

document.getElementById('heroName').textContent = '👋 أهلاً، ' + (user.full_name || user.name || '');
document.getElementById('heroGrade').textContent = '🎓 ' + gradeLabel(user.grade);

function updateThemeBtn(){ document.getElementById('themeBtn').textContent = document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'; }
function onToggleTheme(){ toggleTheme(); updateThemeBtn(); }

let allCourses = [], enrolledCourses = [], paymentsData = [];
let notifOpen = false;

// ─── Load All Data ────────────────────
async function loadAll(){
  const [coursesRes, certsRes, paymentsRes, notifsRes] = await Promise.all([
    mfFetch(`student-courses?grade=${user.grade}&user_id=${user.id}`),
    mfFetch(`certificates?user_id=${user.id}`),
    mfFetch(`create-payment?user_id=${user.id}`),
    mfFetch(`user-notifications?user_id=${user.id}`)
  ]);

  allCourses = coursesRes.courses || [];
  paymentsData = paymentsRes.payments || [];
  renderCourses(allCourses);
  renderCerts(certsRes.certificates || []);
  renderNotifs(notifsRes.notifications || []);
  renderStats();
  buildSubjectFilters(allCourses);
}

function renderStats(){
  const enrolled = allCourses.filter(c=>c.enrolled).length;
  const pending = paymentsData.filter(p=>p.status==='pending').length;
  document.getElementById('sMyCourses').textContent = enrolled;
  document.getElementById('sPending').textContent = pending;
}

function buildSubjectFilters(courses){
  const subjects = [...new Set(courses.map(c=>c.subject).filter(Boolean))];
  const wrap = document.getElementById('subjectFilters');
  subjects.forEach(s=>{
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.subject = s;
    btn.textContent = s;
    btn.onclick = ()=>filterCourses(btn,s);
    wrap.appendChild(btn);
  });
}

function filterCourses(btn, subject){
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = subject ? allCourses.filter(c=>c.subject===subject) : allCourses;
  renderCourses(filtered);
}

function renderCourses(courses){
  const grid = document.getElementById('coursesGrid');
  const enrolledGrid = document.getElementById('enrolledGrid');
  const enrolledArr = courses.filter(c=>c.enrolled);
  const availableArr = courses.filter(c=>!c.enrolled);

  // Enrolled section
  if(enrolledArr.length){
    document.getElementById('enrolledSection').classList.remove('hidden');
    enrolledGrid.innerHTML = enrolledArr.map(c=>courseCardHTML(c,true)).join('');
  }

  // Stats
  document.getElementById('sMyCourses').textContent = enrolledArr.length;

  // Available
  if(!availableArr.length){ grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📚</div><p>لا توجد كورسات متاحة لصفك حالياً</p></div>'; return; }
  grid.innerHTML = availableArr.map(c=>courseCardHTML(c,false)).join('');
}

function courseCardHTML(c, enrolled){
  const status = enrolled ? 'enrolled' : (c.payment_status==='pending' ? 'pending' : 'available');
  const statusLabel = enrolled ? '✅ مشترك' : (status==='pending' ? '⏳ قيد المراجعة' : '💳 اشتراك');
  const statusClass = enrolled ? 'status-enrolled' : (status==='pending' ? 'status-pending' : 'status-available');
  const sched = (c.schedules||[]).slice(0,2).map(s=>`${s.day_of_week} ${s.start_time}`).join(' | ');

  // Progress
  const progress = c.progress_percent || 0;
  let progressHTML = '';
  if(enrolled && progress !== undefined){
    progressHTML = `<div class="mt-2"><div class="flex items-center justify-between mb-1"><span class="text-xs text-muted">التقدم</span><span class="text-xs font-bold text-primary">${progress}%</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${progress}%"></div></div></div>`;
  }

  const priceHTML = !enrolled && c.price > 0 ? `<span class="badge badge-warn">${fmtNum(c.price)} جنيه</span>` : (c.price===0?'<span class="badge badge-success">مجاني</span>':'');

  return `<div class="course-card">
    <div class="course-card-body">
      <div class="flex items-center justify-between mb-2">
        <span class="badge badge-primary">${c.subject||''}</span>
        ${priceHTML}
      </div>
      <div class="course-card-title">${c.title}</div>
      <div class="course-card-teacher">👨‍🏫 ${c.teacher_name}</div>
      ${sched?`<div class="text-xs text-muted mt-2">📅 ${sched}</div>`:''}
      ${progressHTML}
    </div>
    <div class="course-card-footer">
      <span class="course-status ${statusClass}">${statusLabel}</span>
      ${enrolled
        ? `<button class="btn btn-primary btn-sm" onclick="openCourse(${c.id},'${c.title.replace(/'/g,'\\'')}','${c.subject||''}','${c.teacher_name.replace(/'/g,'\\'')}',${c.price||0})">▶️ فتح</button>`
        : status==='available'
          ? `<button class="btn btn-primary btn-sm" onclick="goPay(${c.id},'${c.title.replace(/'/g,'\\'')}','${c.subject||''}','${c.teacher_name.replace(/'/g,'\\'')}',${c.price||0})">💳 اشتراك</button>`
          : '<span class="text-xs text-muted">جاري المراجعة</span>'
      }
    </div>
  </div>`;
}

function openCourse(id, title, subject, teacher, price){
  localStorage.setItem('mf_selected_course', JSON.stringify({id,title,subject,teacher_name:teacher,price}));
  window.location.href = 'course.html';
}
function goPay(id, title, subject, teacher, price){
  localStorage.setItem('mf_selected_course', JSON.stringify({id,title,subject,teacher_name:teacher,price}));
  window.location.href = 'payment.html';
}

function renderCerts(certs){
  document.getElementById('sCerts').textContent = certs.length;
  if(!certs.length) return;
  document.getElementById('certsSection').classList.remove('hidden');
  document.getElementById('certsGrid').innerHTML = certs.map(c=>`
    <div class="cert-card fade-up">
      <div class="text-center mb-3" style="font-size:40px">🏅</div>
      <div class="font-bold text-center">${c.course_title||'كورس'}</div>
      <div class="text-sm text-muted text-center mt-1">${c.subject||''} — ${c.teacher||''}</div>
      <div class="text-xs text-muted text-center mt-2">${fmtDate(c.issued_at)}</div>
      <div class="text-center mt-2"><span class="badge badge-success"># ${c.cert_code}</span></div>
    </div>`).join('');
}

// ─── Notifications ────────────────────
let notifData = [];
function renderNotifs(notifs){
  notifData = notifs;
  const unread = notifs.filter(n=>!n.is_read).length;
  document.getElementById('notifDot').classList.toggle('hidden', !unread);
  const list = document.getElementById('notifList');
  if(!notifs.length){ list.innerHTML = '<div class="text-center text-muted p-4 text-sm">لا توجد إشعارات</div>'; return; }
  list.innerHTML = notifs.map(n=>`
    <div class="notif-item ${n.is_read?'':'unread'}">
      ${!n.is_read?'<div class="notif-dot-item"></div>':'<div style="width:8px"></div>'}
      <div><div class="text-sm font-bold">${n.title}</div><div class="text-xs text-muted mt-1">${n.message}</div><div class="text-xs text-muted mt-1">${fmtDateTime(n.created_at)}</div></div>
    </div>`).join('');
}

function toggleNotifs(){
  notifOpen = !notifOpen;
  document.getElementById('notifPanel').classList.toggle('hidden', !notifOpen);
}
function markAllRead(){
  document.getElementById('notifDot').classList.add('hidden');
  document.querySelectorAll('.notif-item').forEach(el=>el.classList.remove('unread'));
  document.querySelectorAll('.notif-dot-item').forEach(el=>el.remove());
}

// Close notifs on outside click
document.addEventListener('click',e=>{
  if(notifOpen && !document.getElementById('notifPanel').contains(e.target) && !document.getElementById('notifBtn').contains(e.target)){
    notifOpen=false; document.getElementById('notifPanel').classList.add('hidden');
  }
});

loadAll();
</script>
