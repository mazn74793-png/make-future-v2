<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Future Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
<script> window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); }; </script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cairo',sans-serif}

#c{position:fixed;inset:0;z-index:0}

.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 45%,transparent 25%,rgba(0,0,0,.9) 100%);
}
.scanlines{
  position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.025;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,#fff 2px,#fff 3px);
}

/* ── Scene ── */
.scene{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}

/* ── Logo ── */
.logo{
  width:110px;height:110px;position:relative;
  margin-bottom:36px;
  opacity:0;
  animation:popIn .9s cubic-bezier(.34,1.56,.64,1) .6s forwards;
}
.logo-glow{
  position:absolute;inset:-25px;
  background:radial-gradient(circle,rgba(124,58,237,.55) 0%,transparent 65%);
  border-radius:50%;
  animation:breathe 3s ease-in-out infinite;
}
.logo-face{
  position:absolute;inset:12px;
  border-radius:50%;
  background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(6,182,212,.08));
  border:1px solid rgba(124,58,237,.35);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
}
.logo-ring-svg{position:absolute;inset:0;width:100%;height:100%}

/* ── Title ── */
.t1{
  font-size:clamp(44px,10vw,88px);
  font-weight:900;letter-spacing:-2px;line-height:1;
  text-align:center;
  background:linear-gradient(135deg,#fff 0%,#c4b5fd 50%,#67e8f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:0;transform:translateY(55px);
  animation:riseUp .85s cubic-bezier(.16,1,.3,1) 1s forwards;
}
.t2{
  font-size:clamp(44px,10vw,88px);
  font-weight:900;letter-spacing:-2px;line-height:1;
  text-align:center;
  background:linear-gradient(135deg,#67e8f9 0%,#a78bfa 60%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:0;transform:translateY(55px);
  animation:riseUp .85s cubic-bezier(.16,1,.3,1) 1.15s forwards;
}
.sub{
  font-size:clamp(11px,2vw,14px);
  font-weight:300;letter-spacing:7px;
  color:rgba(255,255,255,.3);
  text-align:center;margin-top:12px;
  opacity:0;transform:translateY(15px);
  animation:riseUp .7s ease 1.35s forwards;
}

/* ── Divider ── */
.divider{
  width:0;height:1px;margin:30px 0 26px;
  background:linear-gradient(90deg,transparent,rgba(124,58,237,.7) 30%,rgba(6,182,212,.7) 70%,transparent);
  animation:grow .7s ease 1.55s forwards;
}

/* ── Tagline ── */
.tag{
  font-size:clamp(12px,1.8vw,14px);
  color:rgba(255,255,255,.28);
  text-align:center;font-weight:400;line-height:2;
  max-width:340px;
  opacity:0;
  animation:fadeIn .7s ease 1.75s forwards;
  margin-bottom:44px;
}

/* ── CTA ── */
.cta-wrap{
  position:relative;
  opacity:0;
  animation:fadeIn .7s ease 2s forwards;
}
.cta-glow{
  position:absolute;inset:-12px;border-radius:100px;
  background:radial-gradient(ellipse,rgba(124,58,237,.35) 0%,transparent 70%);
  animation:ctaGlow 2s ease-in-out infinite;
  pointer-events:none;
}
.cta{
  position:relative;
  display:inline-flex;align-items:center;gap:14px;
  padding:17px 50px;border-radius:100px;
  border:1px solid rgba(124,58,237,.5);
  background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(6,182,212,.1));
  backdrop-filter:blur(20px);
  font-family:'Cairo',sans-serif;font-size:17px;font-weight:700;color:#fff;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
.cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0),rgba(6,182,212,0));
  transition:background .3s;
}
.cta:hover{
  border-color:rgba(124,58,237,.9);
  box-shadow:0 0 40px rgba(124,58,237,.4),inset 0 0 30px rgba(124,58,237,.08);
  transform:scale(1.06) translateY(-3px);
}
.cta:hover::before{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(6,182,212,.08))}
.cta:active{transform:scale(.97)}
.arr{font-size:20px;display:inline-block;transition:transform .3s}
.cta:hover .arr{transform:translateX(-6px)}

/* ── Stats ── */
.stats{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;
  padding:18px 24px 24px;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);
  opacity:0;
  animation:fadeIn .7s ease 2.4s forwards;
}
.stat{
  padding:0 36px;text-align:center;
  border-left:1px solid rgba(255,255,255,.05);
}
.stat:last-child{border-left:none}
.sn{
  font-size:clamp(20px,4vw,28px);font-weight:900;
  background:linear-gradient(135deg,#a78bfa,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sl{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:3px;margin-top:3px}

/* ── Floating orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:3;filter:blur(70px);animation:floatOrb ease-in-out infinite}
.o1{width:350px;height:350px;background:rgba(124,58,237,.07);top:-80px;right:-80px;animation-duration:22s}
.o2{width:280px;height:280px;background:rgba(6,182,212,.05);bottom:-60px;left:-60px;animation-duration:28s;animation-delay:-10s}

/* ── Keyframes ── */
@keyframes popIn{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes riseUp{from{opacity:0;transform:translateY(55px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes grow{from{width:0}to{width:180px}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.2);opacity:1}}
@keyframes ctaGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes floatOrb{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-25px)}}

/* ── Exit ── */
.out .scene{animation:sceneOut .65s ease forwards}
.out #c{transition:opacity .65s;opacity:0}
.out .stats{transition:opacity .65s;opacity:0}
@keyframes sceneOut{to{opacity:0;transform:scale(1.06) translateY(-15px)}}

@media(max-width:480px){
  .stat{padding:0 18px}
  .t1,.t2{letter-spacing:-1px}
  .cta{padding:15px 38px;font-size:15px}
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="scene">
  <div class="logo">
    <div class="logo-glow"></div>
    <svg class="logo-ring-svg" viewBox="0 0 110 110">
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <circle cx="55" cy="55" r="50" fill="none" stroke="url(#lg)" stroke-width="1.5" stroke-dasharray="7 5" opacity=".45">
        <animateTransform attributeName="transform" type="rotate" from="0 55 55" to="360 55 55" dur="14s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="55" r="38" fill="none" stroke="url(#lg)" stroke-width=".8" opacity=".2">
        <animateTransform attributeName="transform" type="rotate" from="360 55 55" to="0 55 55" dur="22s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <div class="logo-face">🎓</div>
  </div>

  <div class="t1">Make Future</div>
  <div class="t2">Center</div>
  <div class="sub">مركز صنع المستقبل</div>
  <div class="divider"></div>
  <p class="tag">تعلّم مع أفضل المدرسين<br>وابنِ مستقبلك في مكان واحد</p>

  <div class="cta-wrap">
    <div class="cta-glow"></div>
    <button class="cta" id="btn">
      <span>ابدأ رحلتك الآن</span>
      <span class="arr">←</span>
    </button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="sn" id="s1">٠</div><div class="sl">COURSES</div></div>
  <div class="stat"><div class="sn" id="s2">٠</div><div class="sl">STUDENTS</div></div>
  <div class="stat"><div class="sn" id="s3">٠</div><div class="sl">VIDEOS</div></div>
</div>

<script>
/* ═══ Canvas: Stars + Aurora + Meteor ═══ */
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};
resize();window.addEventListener('resize',resize);

/* Stars */
const stars=Array.from({length:220},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.3+.2,
  a:Math.random()*.5+.1,
  ts:Math.random()*.015+.004,
  to:Math.random()*Math.PI*2
}));

/* Aurora layers */
const aur=[
  {oy:.38,amp:90,fr:.0013,sp:.00022,col:'124,58,237',op:.055},
  {oy:.52,amp:65,fr:.0019,sp:.0003,col:'6,182,212',op:.045},
  {oy:.44,amp:110,fr:.0009,sp:.00018,col:'167,139,250',op:.035},
];

/* Meteor state */
let met=null,metTimer;
const spawnMet=()=>{
  met={x:W*.15+Math.random()*W*.5,y:-30,vx:9,vy:7,life:1};
  metTimer=setTimeout(spawnMet,5e3+Math.random()*7e3);
};
setTimeout(spawnMet,3e3);

let T=0;
const draw=()=>{
  cx.clearRect(0,0,W,H);

  /* BG */
  const bg=cx.createRadialGradient(W/2,H*.38,0,W/2,H*.5,Math.hypot(W,H)*.75);
  bg.addColorStop(0,'#0e0920');bg.addColorStop(.6,'#070913');bg.addColorStop(1,'#020305');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  /* Stars */
  stars.forEach(s=>{
    const tw=Math.sin(T*s.ts*60+s.to)*.35+.65;
    cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${s.a*tw})`;cx.fill();
  });

  /* Aurora */
  aur.forEach(a=>{
    cx.beginPath();cx.moveTo(0,H*(a.oy+.12));
    for(let x=0;x<=W;x+=5){
      const y=H*a.oy
        +Math.sin(x*a.fr+T*a.sp*1000)*a.amp
        +Math.sin(x*a.fr*1.8+T*a.sp*750)*a.amp*.35
        +Math.cos(x*a.fr*.6+T*a.sp*1200)*a.amp*.2;
      cx.lineTo(x,y);
    }
    cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();
    const g=cx.createLinearGradient(0,0,W,0);
    g.addColorStop(0,'transparent');
    g.addColorStop(.25,`rgba(${a.col},${a.op})`);
    g.addColorStop(.75,`rgba(${a.col},${a.op*1.6})`);
    g.addColorStop(1,'transparent');
    cx.fillStyle=g;cx.fill();
  });

  /* Meteor */
  if(met){
    const len=100,dx=-len,dy=len*.7;
    const mg=cx.createLinearGradient(met.x,met.y,met.x+dx,met.y+dy);
    mg.addColorStop(0,`rgba(255,255,255,${met.life})`);
    mg.addColorStop(.4,'rgba(167,139,250,.5)');
    mg.addColorStop(1,'transparent');
    cx.beginPath();cx.moveTo(met.x,met.y);cx.lineTo(met.x+dx,met.y+dy);
    cx.strokeStyle=mg;cx.lineWidth=1.8;cx.stroke();
    met.x+=met.vx;met.y+=met.vy;met.life-=.018;
    if(met.life<=0||met.y>H+50)met=null;
  }

  /* Center nebula */
  const nb=cx.createRadialGradient(W/2,H*.4,0,W/2,H*.4,Math.min(W,H)*.35);
  nb.addColorStop(0,'rgba(124,58,237,.06)');
  nb.addColorStop(.5,'rgba(6,182,212,.03)');
  nb.addColorStop(1,'transparent');
  cx.fillStyle=nb;cx.fillRect(0,0,W,H);

  T+=.016;requestAnimationFrame(draw);
};
draw();

/* ═══ Arabic counters ═══ */
const AR='٠١٢٣٤٥٦٧٨٩';
const toAr=n=>String(n).replace(/\d/g,d=>AR[d]);
const countUp=(el,to,dur,delay)=>{
  setTimeout(()=>{
    const t0=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-t0)/dur,1);
      el.textContent=toAr(Math.round((1-Math.pow(1-p,3))*to))+'+';
      if(p<1)requestAnimationFrame(tick);
    };tick();
  },delay);
};
countUp(document.getElementById('s1'),24,1500,2300);
countUp(document.getElementById('s2'),1500,2000,2400);
countUp(document.getElementById('s3'),200,1300,2500);

/* ═══ Enter logic ═══ */
let gone=false;
const enter=()=>{
  if(gone)return;gone=true;
  clearTimeout(metTimer);
  // Always go to login — let login handle redirect if already logged in
  document.body.classList.add('out');
  setTimeout(()=>location.href='login.html',680);
};

document.getElementById('btn').addEventListener('click',e=>{e.stopPropagation();enter();});
document.addEventListener('click',enter);
document.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')enter();});
setTimeout(enter,7500);
</script>
</body>
</html>
